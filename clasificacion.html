<!doctype html>
<html lang="es" class="overflow-x-hidden">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Resultados | CD Los Almendros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;700;900&display=swap");
      body {
        font-family: "Public Sans", sans-serif;
        overflow-x: hidden;
        width: 100%;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .tab-active {
        color: #004d26;
        border-bottom: 3px solid #004d26;
      }
      .tabla-scroll {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        width: 100%;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <header
      class="bg-[#004d26] py-3 px-6 text-white flex justify-between items-center shadow-md sticky top-0 z-[60] w-full"
    >
      <a
        href="index.html"
        class="flex items-center gap-3 hover:text-yellow-500 transition-colors"
      >
        <i class="fa-solid fa-arrow-left text-[10px]"></i>
        <span class="font-black italic text-[10px] uppercase tracking-tighter"
          >Inicio</span
        >
      </a>
      <span
        class="font-black italic text-[10px] uppercase tracking-tighter text-yellow-500"
        >GRAF ENGINE</span
      >
    </header>

    <section
      class="bg-white w-full px-4 md:px-8 pt-10 pb-4 border-b border-gray-100"
    >
      <h1
        class="text-4xl sm:text-6xl md:text-8xl font-black italic uppercase tracking-tighter text-[#004d26] leading-none mb-6"
      >
        Resultados
      </h1>

      <div class="flex flex-wrap items-center gap-3 mb-6">
        <div class="flex flex-col">
          <span class="text-[7px] font-black uppercase text-gray-400 mb-1 ml-1"
            >Año</span
          >
          <select
            id="selector-anio"
            onchange="cargarCompeticiones()"
            class="bg-gray-100 border-none px-3 py-2 rounded-xl font-black uppercase text-[10px] outline-none w-fit"
          >
            <option value="2026">2026</option>
          </select>
        </div>

        <div class="flex flex-col">
          <span class="text-[7px] font-black uppercase text-gray-400 mb-1 ml-1"
            >Competición</span
          >
          <select
            id="selector-torneo"
            onchange="cargarContenido()"
            class="bg-gray-100 border-none px-4 py-2 rounded-xl font-black uppercase text-[10px] outline-none w-fit max-w-[180px] md:max-w-xs"
          >
            <option value="">Cargando...</option>
          </select>
        </div>
      </div>

      <div
        id="tabs-hibrido"
        class="hidden flex gap-6 overflow-x-auto no-scrollbar"
      >
        <button
          onclick="cambiarVista('LIGA')"
          id="tab-liga"
          class="pb-3 font-black uppercase text-[9px] tracking-widest whitespace-nowrap transition-all"
        >
          Fase de Grupos
        </button>
        <button
          onclick="cambiarVista('ELIM')"
          id="tab-elim"
          class="pb-3 font-black uppercase text-[9px] tracking-widest whitespace-nowrap transition-all"
        >
          Fase Final
        </button>
      </div>
    </section>

    <main class="w-full max-w-full px-2 md:px-8 py-8 overflow-x-hidden">
      <div id="vista-liga" class="space-y-10 w-full"></div>
      <div id="vista-eliminatorias" class="hidden space-y-12 w-full"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script>
      let torneosFull = [];

      window.onload = cargarCompeticiones;

      async function cargarCompeticiones() {
        const anio = document.getElementById("selector-anio").value;
        const { data } = await _supabase
          .from("competiciones")
          .select("*")
          .eq("temporada", anio)
          .order("id", { ascending: false });
        const select = document.getElementById("selector-torneo");
        if (data && data.length > 0) {
          torneosFull = data;
          select.innerHTML = data
            .map((c) => `<option value="${c.id}">${c.nombre}</option>`)
            .join("");
          cargarContenido();
        } else {
          select.innerHTML = '<option value="">Sin torneos</option>';
        }
      }

      async function cargarContenido() {
        const torneoId = document.getElementById("selector-torneo").value;
        const torneo = torneosFull.find((t) => t.id == torneoId);
        if (!torneo) return;

        const tabs = document.getElementById("tabs-hibrido");
        if (torneo.tipo === "HIBRIDO") {
          tabs.classList.remove("hidden");
          cambiarVista("LIGA");
        } else if (torneo.tipo === "ELIMINATORIA") {
          tabs.classList.add("hidden");
          cambiarVista("ELIM");
        } else {
          tabs.classList.add("hidden");
          cambiarVista("LIGA");
        }
      }

      function cambiarVista(modo) {
        const vLiga = document.getElementById("vista-liga");
        const vElim = document.getElementById("vista-eliminatorias");
        const tLiga = document.getElementById("tab-liga");
        const tElim = document.getElementById("tab-elim");

        if (modo === "LIGA") {
          vLiga.classList.remove("hidden");
          vElim.classList.add("hidden");
          tLiga?.classList.add("tab-active");
          tElim?.classList.remove("tab-active");
          renderizarTablas();
        } else {
          vLiga.classList.add("hidden");
          vElim.classList.remove("hidden");
          tElim?.classList.add("tab-active");
          tLiga?.classList.remove("tab-active");
          renderizarLlaves();
        }
      }

      async function renderizarTablas() {
        const torneoId = document.getElementById("selector-torneo").value;
        const { data } = await _supabase
          .from("posiciones")
          .select("*")
          .eq("competicion_id", torneoId)
          .order("puntos", { ascending: false });
        const contenedor = document.getElementById("vista-liga");
        if (!data || data.length === 0) {
          contenedor.innerHTML =
            '<p class="text-center py-10 text-gray-400 italic">No hay datos.</p>';
          return;
        }

        const grupos = data.reduce((acc, item) => {
          const g = item.grupo || "A";
          if (!acc[g]) acc[g] = [];
          acc[g].push(item);
          return acc;
        }, {});

        contenedor.innerHTML = Object.keys(grupos)
          .map(
            (nombreGrupo) => `
                <div class="bg-white rounded-[1.5rem] shadow-lg border border-gray-100 w-full mb-10">
                    <div class="bg-gray-50 px-4 py-3 border-b border-gray-100">
                        <h2 class="text-[10px] md:text-xs font-black uppercase italic text-[#004d26]">Serie ${nombreGrupo}</h2>
                    </div>
                    <div class="tabla-scroll no-scrollbar">
                        <table class="w-full text-left text-[9px] md:text-[11px]">
                            <thead>
                                <tr class="text-gray-400 font-black uppercase border-b border-gray-50">
                                    <th class="px-3 py-3">Club</th>
                                    <th class="px-2 py-3 text-center">PJ</th>
                                    <th class="px-2 py-3 text-center hidden sm:table-cell">PG</th>
                                    <th class="px-2 py-3 text-center">DG</th>
                                    <th class="px-3 py-3 text-center text-[#004d26]">PTS</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-50">
                                ${grupos[nombreGrupo]
                                  .map(
                                    (e, i) => `
                                    <tr class="${e.equipo_nombre.includes("Almendros") ? "bg-green-50/50" : ""} hover:bg-gray-50 transition-colors">
                                        <td class="px-3 py-3">
                                            <div class="flex items-center gap-2">
                                                <span class="text-gray-300 font-black w-2 text-[8px]">${i + 1}</span>
                                                <img src="${e.logo_url}" class="w-4 h-4 md:w-5 md:h-5 object-contain">
                                                <span class="font-black uppercase italic text-gray-800 truncate max-w-[80px] md:max-w-none">${e.equipo_nombre}</span>
                                            </div>
                                        </td>
                                        <td class="px-2 py-3 text-center font-bold text-gray-600">${e.pj}</td>
                                        <td class="px-2 py-3 text-center hidden sm:table-cell">${e.pg}</td>
                                        <td class="px-2 py-3 text-center font-bold ${e.gf - e.gc >= 0 ? "text-green-500" : "text-red-400"}">${e.gf - e.gc}</td>
                                        <td class="px-3 py-3 text-center font-black text-[#004d26] text-xs">${e.puntos}</td>
                                    </tr>`,
                                  )
                                  .join("")}
                            </tbody>
                        </table>
                    </div>
                </div>
            `,
          )
          .join("");
      }

      async function renderizarLlaves() {
        const torneoId = document.getElementById("selector-torneo").value;
        const { data } = await _supabase
          .from("eliminatorias")
          .select("*")
          .eq("competicion_id", torneoId)
          .order("orden", { ascending: true });
        const contenedor = document.getElementById("vista-eliminatorias");
        if (!data || data.length === 0) {
          contenedor.innerHTML =
            '<p class="text-center py-10 text-gray-400 italic">Fase final próximamente.</p>';
          return;
        }

        const fases = data.reduce((acc, item) => {
          if (!acc[item.fase]) acc[item.fase] = [];
          acc[item.fase].push(item);
          return acc;
        }, {});

        contenedor.innerHTML = Object.keys(fases)
          .map(
            (nombreFase) => `
                <div class="space-y-4">
                    <h3 class="text-sm font-black uppercase italic text-[#004d26] ml-2 tracking-tighter border-l-4 border-[#004d26] pl-3">${nombreFase}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${fases[nombreFase]
                          .map((l) => {
                            const showVuelta = l.modo === "IDA_VUELTA";
                            const showPenales =
                              l.penales_1 > 0 || l.penales_2 > 0;

                            return `
                            <div class="bg-white p-4 rounded-[1.5rem] shadow-xl border border-gray-100">
                                <div class="space-y-3">
                                    <div class="flex justify-between items-center bg-gray-50 p-2.5 rounded-xl">
                                        <div class="flex items-center gap-2">
                                            <img src="${l.logo_1}" class="w-6 h-6 object-contain">
                                            <span class="font-black uppercase italic text-[9px] text-gray-700 truncate max-w-[120px]">${l.equipo_1}</span>
                                        </div>
                                        <div class="flex gap-1.5">
                                            <span class="bg-white w-7 h-7 flex items-center justify-center rounded-lg shadow-sm font-black text-xs">${l.goles_1_ida}</span>
                                            ${showVuelta ? `<span class="bg-[#004d26] text-white w-7 h-7 flex items-center justify-center rounded-lg shadow-sm font-black text-xs">${l.goles_1_vuelta}</span>` : ""}
                                        </div>
                                    </div>
                                    <div class="flex justify-between items-center bg-gray-50 p-2.5 rounded-xl">
                                        <div class="flex items-center gap-2">
                                            <img src="${l.logo_2}" class="w-6 h-6 object-contain">
                                            <span class="font-black uppercase italic text-[9px] text-gray-700 truncate max-w-[120px]">${l.equipo_2}</span>
                                        </div>
                                        <div class="flex gap-1.5">
                                            <span class="bg-white w-7 h-7 flex items-center justify-center rounded-lg shadow-sm font-black text-xs">${l.goles_2_ida}</span>
                                            ${showVuelta ? `<span class="bg-[#004d26] text-white w-7 h-7 flex items-center justify-center rounded-lg shadow-sm font-black text-xs">${l.goles_2_vuelta}</span>` : ""}
                                        </div>
                                    </div>
                                </div>
                                ${
                                  showPenales
                                    ? `
                                    <div class="mt-4 pt-3 border-t border-dashed flex justify-center items-center gap-3">
                                        <span class="text-[8px] font-black text-gray-300 uppercase italic tracking-widest">Penales</span>
                                        <span class="font-black text-xs text-red-600 bg-red-50 px-3 py-1 rounded-full">${l.penales_1} - ${l.penales_2}</span>
                                    </div>
                                `
                                    : ""
                                }
                            </div>`;
                          })
                          .join("")}
                    </div>
                </div>
            `,
          )
          .join("");
      }

      inicializar();
    </script>
  </body>
</html>

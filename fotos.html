<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fotos | CD Los Almendros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .text-shadow {
        text-shadow: 0 4px 15px rgba(0, 0, 0, 0.9);
      }
      /* Ocultar barra de scroll en el menú móvil pero permitir el deslizamiento */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body
    class="bg-[#0b0e14] text-white font-sans antialiased relative overflow-x-hidden"
  >
    <!-- ========================================== -->
    <!-- BARRA DE NAVEGACIÓN AUTO-OCULTABLE         -->
    <!-- ========================================== -->
    <div
      id="menu-flotante"
      class="fixed top-0 left-0 w-full z-[100] transition-transform duration-500 ease-in-out transform -translate-y-full md:hover:translate-y-0 shadow-2xl"
    >
      <!-- HEADER OFICIAL -->
      <header
        class="bg-[#004d26] py-3 px-4 md:px-8 text-white flex flex-col md:flex-row justify-between items-center gap-4 md:gap-0 border-b border-white/10"
      >
        <div
          class="flex items-center w-full md:w-auto justify-between md:justify-start gap-6"
        >
          <a
            href="index.html"
            class="flex items-center gap-3 hover:text-yellow-500 transition-colors shrink-0"
          >
            <i class="fa-solid fa-arrow-left text-xs"></i>
            <span
              class="font-black italic text-[10px] md:text-xs tracking-tighter uppercase"
              >Inicio</span
            >
          </a>
          <span
            class="md:hidden font-black italic text-[10px] tracking-tighter uppercase"
            >CD Los Almendros</span
          >
        </div>

        <nav
          class="flex items-center gap-6 md:gap-10 overflow-x-auto no-scrollbar whitespace-nowrap w-full md:w-auto justify-start md:justify-center px-2 md:px-0"
        >
          <a
            href="jugadores.html"
            class="font-black italic text-[10px] md:text-xs tracking-widest uppercase text-white/60 hover:text-white transition-all pb-1"
            >Jugadores</a
          >
          <a
            href="calendario.html"
            class="font-black italic text-[10px] md:text-xs tracking-widest uppercase text-white/60 hover:text-white transition-all pb-1"
            >Calendario</a
          >
          <a
            href="resultados.html"
            class="font-black italic text-[10px] md:text-xs tracking-widest uppercase text-white/60 hover:text-white transition-all pb-1"
            >Resultados</a
          >
          <a
            href="clasificacion.html"
            class="font-black italic text-[10px] md:text-xs tracking-widest uppercase text-white/60 hover:text-white transition-all pb-1"
            >Clasificación</a
          >
          <a
            href="fotos.html"
            class="font-black italic text-[10px] md:text-xs tracking-widest uppercase text-yellow-500 border-b-2 border-yellow-500 pb-1"
            >Fotos</a
          >
        </nav>

        <span
          class="hidden md:block font-black italic text-[10px] md:text-xs tracking-tighter uppercase shrink-0"
          >CD Los Almendros</span
        >
      </header>

      <!-- PESTAÑA INFERIOR (Tirador) -->
      <div
        class="absolute left-0 top-full w-full flex justify-center -mt-px cursor-pointer"
        onclick="toggleMenuCelular()"
      >
        <div
          class="bg-[#004d26] w-16 h-5 rounded-b-xl flex items-center justify-center shadow-lg border-b border-x border-white/10 md:hidden"
        >
          <i
            id="icono-menu"
            class="fa-solid fa-chevron-down text-white/80 text-[10px] animate-bounce"
          ></i>
        </div>
        <!-- Pestaña transparente más ancha para computadoras para facilitar el hover -->
        <div class="hidden md:flex w-full h-8 bg-transparent"></div>
      </div>
    </div>

    <!-- ========================================== -->
    <!-- 1. HERO: LA ÚLTIMA GALERÍA                 -->
    <!-- ========================================== -->
    <section
      id="hero-header"
      class="relative w-full h-[60vh] md:h-[80vh] overflow-hidden group cursor-pointer hidden"
    >
      <img
        id="hero-img"
        src=""
        class="absolute inset-0 w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105"
      />
      <div
        class="absolute inset-0 bg-gradient-to-t from-[#0b0e14] via-[#0b0e14]/40 to-transparent"
      ></div>

      <div
        class="absolute inset-0 flex flex-col items-center justify-end pb-16 text-center z-10 px-4 pt-10"
      >
        <div
          class="bg-[#004d26] text-white px-4 py-1.5 rounded-full font-black text-xs flex items-center gap-2 shadow-lg mb-4"
        >
          <span id="hero-count">0</span>
          <i class="fa-solid fa-camera text-yellow-500"></i>
        </div>
        <h1
          id="hero-title"
          class="text-4xl md:text-6xl font-black uppercase italic tracking-tighter text-shadow border-b-[3px] border-yellow-500 pb-2 hover:text-gray-300 transition"
        >
          Cargando...
        </h1>
        <p
          id="hero-date"
          class="text-gray-400 font-bold text-[10px] uppercase tracking-[0.2em] mt-4"
        >
          <i class="fa-regular fa-image mr-1"></i> Galería Oficial
        </p>
      </div>
    </section>

    <!-- ========================================== -->
    <!-- 2. GRID DE GALERÍAS                        -->
    <!-- ========================================== -->
    <section
      class="py-16 bg-white text-gray-900 rounded-t-3xl relative -mt-6 z-20 min-h-screen shadow-[0_-10px_40px_rgba(0,0,0,0.5)]"
    >
      <div class="container mx-auto px-4 md:px-8 max-w-7xl">
        <h2
          class="text-3xl font-black uppercase italic text-center mb-10 tracking-tighter"
        >
          Últimas Galerías
        </h2>

        <div
          id="galerias-grid"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"
        >
          <div class="col-span-full text-center py-10">
            <i
              class="fa-solid fa-circle-notch fa-spin text-3xl text-gray-400"
            ></i>
          </div>
        </div>
      </div>
    </section>

    <!-- ========================================== -->
    <!-- CONEXIÓN A SUPABASE Y LÓGICA               -->
    <!-- ========================================== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>

    <script>
      // LOGICA DE LA BARRA AUTO-OCULTABLE PARA CELULARES
      function toggleMenuCelular() {
        const menu = document.getElementById("menu-flotante");
        const icono = document.getElementById("icono-menu");

        if (menu.classList.contains("-translate-y-full")) {
          // Abrir
          menu.classList.remove("-translate-y-full");
          icono.classList.remove("fa-chevron-down", "animate-bounce");
          icono.classList.add("fa-chevron-up");
        } else {
          // Cerrar
          menu.classList.add("-translate-y-full");
          icono.classList.remove("fa-chevron-up");
          icono.classList.add("fa-chevron-down", "animate-bounce");
        }
      }

      // LOGICA DE SUPABASE
      async function cargarPortal() {
        const { data: galerias, error } = await _supabase
          .from("galerias")
          .select("*, fotos(count)")
          .order("creado_en", { ascending: false });

        if (error || !galerias || galerias.length === 0) {
          document.getElementById("galerias-grid").innerHTML =
            '<p class="col-span-full text-center text-gray-500 font-bold mt-10">Aún no hay galerías publicadas.</p>';
          return;
        }

        const albumPrincipal = galerias[0];
        document.getElementById("hero-header").classList.remove("hidden");
        document.getElementById("hero-header").onclick = () =>
          (window.location.href = `galeria.html?id=${albumPrincipal.id}`);
        document.getElementById("hero-img").src = albumPrincipal.portada_url;
        document.getElementById("hero-title").innerText = albumPrincipal.titulo;
        document.getElementById("hero-count").innerText =
          albumPrincipal.fotos[0]?.count || 0;

        const fechaHero = new Date(albumPrincipal.creado_en).toLocaleDateString(
          "es-ES",
          { day: "numeric", month: "short", year: "numeric" },
        );
        document.getElementById("hero-date").innerHTML =
          `<i class="fa-regular fa-calendar mr-1"></i> ${fechaHero}`;

        const grid = document.getElementById("galerias-grid");
        grid.innerHTML = galerias
          .map((g) => {
            const fechaStr = new Date(g.creado_en).toLocaleDateString("es-ES", {
              day: "numeric",
              month: "short",
              year: "2-digit",
            });
            const cantidadFotos = g.fotos[0]?.count || 0;

            return `
            <a href="galeria.html?id=${g.id}" class="group block border border-gray-100 shadow-sm hover:shadow-2xl transition-all duration-300 bg-white rounded-xl overflow-hidden">
              <div class="relative h-48 overflow-hidden bg-gray-100">
                <img src="${g.portada_url}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                <div class="absolute top-3 right-3 bg-[#004d26] text-white px-2 py-1 rounded text-[10px] font-black flex items-center gap-1 shadow-md">
                  ${cantidadFotos} <i class="fa-solid fa-camera text-yellow-500"></i>
                </div>
              </div>
              <div class="p-4">
                <h3 class="font-black text-sm uppercase italic leading-tight group-hover:text-[#004d26] transition-colors line-clamp-2" title="${g.titulo}">
                  ${g.titulo}
                </h3>
                <div class="flex justify-between items-center mt-4 border-t pt-3 border-gray-50">
                  <span class="text-[8px] font-bold text-[#004d26] uppercase tracking-widest flex items-center gap-1"><i class="fa-solid fa-images"></i> CDLA Oficial</span>
                  <span class="text-[8px] font-bold text-gray-400 uppercase">${fechaStr}</span>
                </div>
              </div>
            </a>
          `;
          })
          .join("");
      }

      cargarPortal();
    </script>
  </body>
</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Calendario Oficial | CD Los Almendros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;700;900&display=swap");
      body {
        font-family: "Public Sans", sans-serif;
      }
      .mes-header {
        border-left: 8px solid #004d26;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900 overflow-x-hidden">
    <header
      class="bg-[#004d26] py-3 px-4 md:px-8 text-white flex flex-col md:flex-row justify-between items-center shadow-md sticky top-0 z-[60] gap-4 md:gap-0"
    >
      <div
        class="flex items-center w-full md:w-auto justify-between md:justify-start gap-6"
      >
        <a
          href="index.html"
          class="flex items-center gap-3 hover:text-yellow-500 transition-colors shrink-0"
        >
          <i class="fa-solid fa-arrow-left text-xs"></i>
          <span
            class="font-black italic text-[10px] md:text-xs tracking-tighter uppercase"
            >Inicio</span
          >
        </a>
        <span
          class="md:hidden font-black italic text-[10px] tracking-tighter uppercase"
          >CD Los Almendros</span
        >
      </div>

      <nav
        class="flex items-center gap-6 md:gap-10 overflow-x-auto no-scrollbar whitespace-nowrap"
      >
        <a
          href="jugadores.html"
          class="font-black italic text-[10px] md:text-xs tracking-widest uppercase text-white/60 hover:text-white transition-all pb-1"
          >Jugadores</a
        >
        <a
          href="calendario.html"
          class="font-black italic text-[10px] md:text-xs tracking-widest uppercase text-yellow-500 border-b-2 border-yellow-500 pb-1"
          >Calendario</a
        >
        <a
          href="resultados.html"
          class="font-black italic text-[10px] md:text-xs tracking-widest uppercase text-white/60 hover:text-white transition-all pb-1"
          >Resultados</a
        >
      </nav>

      <span
        class="hidden md:block font-black italic text-[10px] md:text-xs tracking-tighter uppercase shrink-0"
        >CD Los Almendros</span
      >
    </header>

    <section class="bg-white container mx-auto px-6 pt-16 pb-4">
      <h1
        class="text-6xl md:text-8xl font-black italic uppercase tracking-tighter text-[#004d26] leading-[0.85]"
      >
        Calendario
      </h1>
      <p
        class="text-gray-400 font-bold uppercase text-[9px] md:text-[11px] tracking-[0.3em] mt-4 ml-1 italic"
      >
        Cronograma de Encuentros | Temporada 2026
      </p>
      <div class="h-1.5 w-full bg-[#004d26] mt-8 rounded-full"></div>
    </section>

    <main class="container mx-auto px-4 py-12 max-w-5xl">
      <div id="calendario-contenedor">
        <div class="flex justify-center py-20">
          <div
            class="animate-spin rounded-full h-12 w-12 border-b-4 border-[#004d26]"
          ></div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script>
      async function cargarCalendario() {
        const { data, error } = await _supabase
          .from("calendario")
          .select("*")
          .order("fecha", { ascending: true })
          .order("hora", { ascending: true });
        if (error) return;
        renderizarCalendario(data);
      }

      function renderizarCalendario(partidos) {
        const contenedor = document.getElementById("calendario-contenedor");
        if (!partidos || partidos.length === 0) {
          contenedor.innerHTML =
            "<p class='font-black uppercase italic text-center py-20 text-gray-400'>No hay encuentros programados</p>";
          return;
        }
        const agrupados = partidos.reduce((acc, p) => {
          const f = new Date(p.fecha + "T00:00:00");
          const m = f
            .toLocaleDateString("es-ES", { month: "long", year: "numeric" })
            .toUpperCase();
          if (!acc[m]) acc[m] = [];
          acc[m].push(p);
          return acc;
        }, {});

        let html = "";
        for (const mes in agrupados) {
          html += `
            <div class="mb-16">
              <h2 class="mes-header text-3xl font-black mb-8 pl-6 uppercase italic text-gray-800 tracking-tighter border-l-8 border-[#004d26]">${mes}</h2>
              <div class="space-y-4">
                ${agrupados[mes].map((p) => crearFilaHTML(p)).join("")}
              </div>
            </div>`;
        }
        contenedor.innerHTML = html;
      }

      function crearFilaHTML(p) {
        const f = new Date(p.fecha + "T00:00:00");
        const dia = f
          .toLocaleDateString("es-ES", { weekday: "short", day: "numeric" })
          .toUpperCase();
        return `
          <div class="flex flex-col md:flex-row items-center p-6 bg-white rounded-[2.5rem] shadow-lg border border-gray-100 hover:shadow-2xl transition-all duration-300 gap-4">
            <div class="flex flex-col items-center justify-center w-full md:w-32 text-center border-b md:border-b-0 md:border-r border-gray-100 pb-4 md:pb-0 shrink-0">
              <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">${dia}</span>
              <span class="text-2xl font-black text-[#004d26] tracking-tighter">${p.hora ? p.hora.substring(0, 5) : "--:--"}</span>
            </div>
            <div class="flex-1 flex flex-col md:flex-row items-center justify-between w-full gap-6 px-0 md:px-6">
              <div class="md:w-28 flex justify-center md:justify-start shrink-0">
                <span class="text-[9px] font-black bg-[#004d26]/10 text-[#004d26] px-3 py-1 rounded-full uppercase tracking-tighter">${p.competicion || "AMISTOSO"}</span>
              </div>
              <div class="flex items-center justify-center gap-4 md:gap-8 flex-1 w-full">
                <div class="flex items-center gap-4 justify-end flex-1">
                  <span class="font-black uppercase italic tracking-tighter text-sm md:text-lg text-gray-800 text-right leading-none">Los Almendros</span>
                  <img src="${LOGO_ALMENDROS}" class="w-10 h-10 md:w-14 md:h-14 object-contain">
                </div>
                <div class="flex items-center justify-center bg-gray-50 px-3 py-1 rounded-xl border border-gray-200">
                  <span class="text-[10px] font-black text-gray-300 italic">VS</span>
                </div>
                <div class="flex items-center gap-4 justify-start flex-1">
                  <img src="${p.rival_escudo || ""}" class="w-10 h-10 md:w-14 md:h-14 object-contain">
                  <span class="font-black uppercase italic tracking-tighter text-sm md:text-lg text-gray-500 text-left leading-none">${p.rival}</span>
                </div>
              </div>
            </div>
            <div class="w-full md:w-44 flex flex-row md:flex-col items-center justify-between md:items-end p-4 md:p-0 md:pl-6 md:border-l border-gray-100 shrink-0">
              <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${p.estado === "PENDIENTE" ? "bg-yellow-100 text-yellow-600" : "bg-gray-50 text-gray-400"}">${p.estado}</span>
              <p class="text-[10px] font-bold text-gray-400 uppercase mt-2"><i class="fa-solid fa-location-dot mr-1 text-[#004d26]"></i> ${p.ubicacion || "TBD"}</p>
            </div>
          </div>`;
      }

      cargarCalendario();
    </script>
  </body>
</html>

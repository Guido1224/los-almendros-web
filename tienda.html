<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda Oficial | CD Los Almendros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;700;900&display=swap");
      @import url("https://fonts.googleapis.com/css2?family=Teko:wght@500;700&display=swap"); /* <-- NUEVA FUENTE DEPORTIVA */
      body {
        font-family: "Public Sans", sans-serif;
        background-color: #0b0e14;
        color: white;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .radio-selector input:checked + div {
        border-color: #eab308;
        background-color: rgba(234, 179, 8, 0.1);
      }
      .radio-selector input:checked + div span {
        color: #eab308;
      }
    </style>
  </head>
  <body class="antialiased relative overflow-x-hidden">
    <header
      class="bg-[#004d26] py-3 px-4 md:px-8 text-white flex justify-between items-center shadow-xl sticky top-0 z-[60] border-b border-white/10"
    >
      <div class="flex items-center gap-6">
        <a
          href="index.html"
          class="flex items-center gap-3 hover:text-yellow-500 transition-colors shrink-0"
        >
          <i class="fa-solid fa-arrow-left text-xs"></i>
          <span
            class="font-black italic text-[10px] md:text-xs tracking-tighter uppercase"
            >Volver</span
          >
        </a>
      </div>
      <div
        class="flex items-center gap-4 cursor-pointer"
        onclick="toggleCart()"
      >
        <span
          class="font-black italic text-[10px] md:text-xs tracking-widest uppercase hidden md:block"
          >Tienda CDLA</span
        >
        <div class="relative">
          <i class="fa-solid fa-bag-shopping text-yellow-500 text-lg"></i>
          <span
            class="absolute -top-2 -right-2 bg-red-600 text-white text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center"
            >1</span
          >
        </div>
      </div>
    </header>

    <main class="container mx-auto max-w-7xl px-4 py-8 lg:py-12">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 lg:gap-16">
        <div class="lg:col-span-6 relative">
          <div class="sticky top-24 space-y-4">
            <div
              class="relative bg-[#151a23] rounded-3xl aspect-[4/5] flex items-center justify-center p-8 border border-white/5 shadow-2xl overflow-hidden group"
            >
              <div
                class="absolute top-6 left-6 bg-[#004d26] text-white text-[9px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full shadow-lg border border-white/20 z-30"
              >
                100% Original
              </div>

              <img
                id="main-product-img"
                src="img/polera-local-espalda-sinfondo.png"
                alt="Camiseta CDLA"
                class="w-full h-full object-contain transition-transform duration-500 drop-shadow-[0_20px_30px_rgba(0,0,0,0.8)] z-10"
              />

              <div
                id="texto-personalizado-overlay"
                class="absolute top-[22%] w-full text-center flex flex-col items-center z-20 opacity-0 transition-opacity duration-300"
              >
                <span
                  id="preview-nombre"
                  class="text-gray-200 font-black uppercase text-xl md:text-3xl tracking-[0.15em] drop-shadow-md"
                  style="font-family: &quot;Arial&quot;, sans-serif"
                ></span>
                <span
                  id="preview-numero"
                  class="text-white font-black text-6xl md:text-8xl mt-1 leading-none drop-shadow-xl"
                  style="font-family: &quot;Impact&quot;, sans-serif"
                ></span>
              </div>
            </div>

            <div class="grid grid-cols-4 gap-4">
              <button
                onclick="
                  cambiarImagenPrincipal(
                    'img/polera-local-frente-sinfondo.png',
                    false,
                  )
                "
                class="bg-[#151a23] rounded-xl aspect-square p-2 border border-yellow-500/50 hover:border-yellow-500 transition overflow-hidden"
              >
                <img
                  src="img/polera-local-frente.jpg"
                  class="w-full h-full object-cover rounded-lg"
                />
              </button>
              <button
                onclick="
                  cambiarImagenPrincipal(
                    'img/polera-local-espalda-sinfondo.png',
                    true,
                  )
                "
                class="bg-[#151a23] rounded-xl aspect-square p-2 border border-white/5 hover:border-yellow-500 transition overflow-hidden relative"
              >
                <span
                  class="absolute top-1 right-1 bg-black/80 text-yellow-500 text-[8px] font-black px-1 rounded"
                  >DORSO</span
                >
                <img
                  src="img/polera-local-espalda.jpg"
                  class="w-full h-full object-cover rounded-lg"
                />
              </button>
              <button
                onclick="
                  cambiarImagenPrincipal(
                    'img/polera-visitante-frente-sinfondo.png',
                    false,
                  )
                "
                class="bg-[#151a23] rounded-xl aspect-square p-2 border border-white/5 hover:border-yellow-500 transition overflow-hidden"
              >
                <img
                  src="img/polera-visitante-frente.jpg"
                  class="w-full h-full object-cover rounded-lg"
                />
              </button>
              <button
                onclick="
                  cambiarImagenPrincipal(
                    'img/polera-visitante-espalda-sinfondo.png',
                    true,
                  )
                "
                class="bg-[#151a23] rounded-xl aspect-square p-2 border border-white/5 hover:border-yellow-500 transition overflow-hidden relative"
              >
                <span
                  class="absolute top-1 right-1 bg-black/80 text-yellow-500 text-[8px] font-black px-1 rounded"
                  >DORSO</span
                >
                <img
                  src="img/polera-visitante-espalda.jpg"
                  class="w-full h-full object-cover rounded-lg"
                />
              </button>
            </div>
          </div>
        </div>

        <div class="lg:col-span-6 space-y-10 pb-24 lg:pb-0">
          <div>
            <h1
              class="text-3xl md:text-5xl font-black italic uppercase tracking-tighter leading-tight"
            >
              Camiseta Oficial <br /><span class="text-[#004d26]"
                >Temporada 2026</span
              >
            </h1>
            <p class="text-yellow-500 text-2xl font-black mt-4">
              Bs. <span id="precio-base">200</span>.00
            </p>
          </div>

          <div class="space-y-4">
            <h3
              class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]"
            >
              Elige Equipación
            </h3>
            <div class="flex gap-4">
              <label class="radio-selector cursor-pointer">
                <input
                  type="radio"
                  name="equipacion"
                  value="Local (Verde)"
                  class="hidden"
                  checked
                  onchange="
                    cambiarImagenPrincipal(
                      'img/polera-local-frente-sinfondo.png',
                      false,
                    )
                  "
                />
                <div
                  class="w-16 h-16 rounded-xl border-2 border-white/10 bg-[#151a23] overflow-hidden p-1 transition-all"
                >
                  <div
                    class="w-full h-full bg-gradient-to-br from-[#8de6c3] to-[#004d26] rounded-lg"
                  ></div>
                </div>
              </label>
              <label class="radio-selector cursor-pointer">
                <input
                  type="radio"
                  name="equipacion"
                  value="Visitante (Negra)"
                  class="hidden"
                  onchange="
                    cambiarImagenPrincipal(
                      'img/polera-visitante-frente-sinfondo.png',
                      false,
                    )
                  "
                />
                <div
                  class="w-16 h-16 rounded-xl border-2 border-white/10 bg-[#151a23] overflow-hidden p-1 transition-all"
                >
                  <div
                    class="w-full h-full bg-gradient-to-br from-gray-900 to-black border border-yellow-500/30 rounded-lg"
                  ></div>
                </div>
              </label>
            </div>
          </div>

          <div class="space-y-4">
            <div class="flex justify-between items-end">
              <h3
                class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]"
              >
                Elige Talla
              </h3>
            </div>
            <div class="grid grid-cols-5 gap-3">
              <label class="radio-selector cursor-pointer text-center">
                <input type="radio" name="talla" value="S" class="hidden" />
                <div
                  class="py-3 border border-white/20 rounded-xl bg-[#151a23] hover:bg-white/5 transition"
                >
                  <span class="font-black text-sm">S</span>
                </div>
              </label>
              <label class="radio-selector cursor-pointer text-center">
                <input
                  type="radio"
                  name="talla"
                  value="M"
                  class="hidden"
                  checked
                />
                <div
                  class="py-3 border border-white/20 rounded-xl bg-[#151a23] hover:bg-white/5 transition"
                >
                  <span class="font-black text-sm">M</span>
                </div>
              </label>
              <label class="radio-selector cursor-pointer text-center">
                <input type="radio" name="talla" value="L" class="hidden" />
                <div
                  class="py-3 border border-white/20 rounded-xl bg-[#151a23] hover:bg-white/5 transition"
                >
                  <span class="font-black text-sm">L</span>
                </div>
              </label>
              <label class="radio-selector cursor-pointer text-center">
                <input type="radio" name="talla" value="XL" class="hidden" />
                <div
                  class="py-3 border border-white/20 rounded-xl bg-[#151a23] hover:bg-white/5 transition"
                >
                  <span class="font-black text-sm">XL</span>
                </div>
              </label>
              <label class="radio-selector cursor-pointer text-center">
                <input type="radio" name="talla" value="XXL" class="hidden" />
                <div
                  class="py-3 border border-white/20 rounded-xl bg-[#151a23] hover:bg-white/5 transition"
                >
                  <span class="font-black text-sm">XXL</span>
                </div>
              </label>
            </div>
          </div>

          <div class="space-y-4 border-t border-white/10 pt-8">
            <div class="flex justify-between items-center">
              <h3
                class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]"
              >
                Personaliza tu equipación
              </h3>
              <span class="text-[10px] font-black text-yellow-500"
                >+ Bs. 50.00</span
              >
            </div>

            <label class="radio-selector cursor-pointer block mb-4">
              <input
                type="checkbox"
                id="check-personalizar"
                class="hidden"
                onchange="
                  togglePersonalizacion();
                  calcularTotal();
                "
              />
              <div
                class="w-full py-4 border border-white/20 rounded-xl bg-[#151a23] flex items-center justify-center gap-3 transition"
              >
                <i class="fa-solid fa-pen text-gray-400" id="icono-pers"></i>
                <span class="font-black text-xs uppercase" id="texto-pers"
                  >Añadir Nombre y Número</span
                >
              </div>
            </label>

            <div
              id="caja-personalizacion"
              class="grid grid-cols-3 gap-4 hidden animate-[fadeIn_0.3s_ease-in-out]"
            >
              <div class="col-span-2">
                <input
                  type="text"
                  id="input-nombre"
                  placeholder="TU NOMBRE"
                  maxlength="12"
                  class="w-full bg-[#151a23] border border-white/20 rounded-xl p-4 text-white font-black uppercase outline-none focus:border-yellow-500 text-sm"
                />
              </div>
              <div class="col-span-1">
                <input
                  type="number"
                  id="input-numero"
                  placeholder="Nº"
                  min="1"
                  max="99"
                  class="w-full bg-[#151a23] border border-white/20 rounded-xl p-4 text-white font-black uppercase outline-none focus:border-yellow-500 text-sm text-center"
                />
              </div>
            </div>
          </div>

          <div class="space-y-4 border-t border-white/10 pt-8">
            <div class="flex justify-between items-center">
              <h3
                class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]"
              >
                Elige Competición
              </h3>
              <span class="text-[10px] font-black text-yellow-500"
                >+ Bs. 30.00</span
              >
            </div>
            <div class="grid grid-cols-2 gap-4">
              <label class="radio-selector cursor-pointer text-center">
                <input
                  type="radio"
                  name="parche"
                  value="ninguno"
                  class="hidden"
                  checked
                  onchange="calcularTotal()"
                />
                <div
                  class="py-4 border border-white/20 rounded-xl bg-[#151a23] hover:bg-white/5 transition flex items-center justify-center gap-2"
                >
                  <i class="fa-solid fa-ban text-gray-500"></i>
                  <span class="font-black text-[10px] uppercase"
                    >Sin Parche</span
                  >
                </div>
              </label>
              <label class="radio-selector cursor-pointer text-center">
                <input
                  type="radio"
                  name="parche"
                  value="copa"
                  class="hidden"
                  onchange="calcularTotal()"
                />
                <div
                  class="py-4 border border-white/20 rounded-xl bg-[#151a23] hover:bg-white/5 transition flex items-center justify-center gap-2"
                >
                  <i class="fa-solid fa-trophy text-gray-500"></i>
                  <span class="font-black text-[10px] uppercase"
                    >Copa Riberalta</span
                  >
                </div>
              </label>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div
      class="fixed bottom-0 left-0 w-full bg-[#0b0e14] border-t border-white/10 p-4 md:p-6 z-[80] shadow-[0_-10px_40px_rgba(0,0,0,0.8)]"
    >
      <div
        class="container mx-auto max-w-7xl flex flex-col md:flex-row justify-between items-center gap-4"
      >
        <div class="flex justify-between items-center w-full md:w-auto gap-8">
          <span
            class="font-bold text-xs uppercase tracking-widest text-gray-400"
            >Subtotal</span
          >
          <span class="font-black text-2xl md:text-3xl text-white"
            >Bs. <span id="precio-total">200</span>.00</span
          >
        </div>
        <button
          onclick="procesarCompra()"
          class="w-full md:w-auto bg-yellow-500 hover:bg-yellow-400 text-black px-12 py-4 rounded-xl font-black uppercase tracking-widest text-xs transition flex items-center justify-center gap-3"
        >
          <i class="fa-solid fa-bag-shopping"></i> Añadir a la cesta
        </button>
      </div>
    </div>

    <div
      id="cart-overlay"
      class="fixed inset-0 bg-black/60 z-[90] hidden backdrop-blur-sm transition-opacity"
      onclick="toggleCart()"
    ></div>

    <div
      id="cart-drawer"
      class="fixed inset-y-0 right-0 w-full md:w-[400px] bg-white shadow-2xl z-[100] transform translate-x-full transition-transform duration-300 flex flex-col"
    >
      <div
        class="p-6 border-b border-gray-100 flex justify-between items-center"
      >
        <h2 class="font-black italic uppercase text-xl text-gray-900">
          Carrito (1)
        </h2>
        <button
          onclick="toggleCart()"
          class="text-gray-400 hover:text-red-500 text-2xl transition transform hover:scale-110"
        >
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div class="flex-1 p-6 overflow-y-auto bg-gray-50">
        <div
          class="flex gap-4 bg-white p-4 rounded-2xl shadow-sm border border-gray-100"
        >
          <img
            id="cart-thumb"
            src="img/polera-local-frente.jpg"
            class="w-24 h-24 object-contain rounded-xl bg-gray-100 p-2"
          />
          <div class="flex-1 flex flex-col justify-center">
            <h4
              id="cart-title"
              class="font-black text-xs uppercase text-gray-800 leading-tight"
            >
              Camiseta Oficial 2026
            </h4>
            <p class="text-[10px] text-gray-500 font-bold uppercase mt-1">
              Talla: <span id="cart-talla" class="text-gray-900">M</span>
            </p>
            <p class="text-[10px] text-gray-500 font-bold uppercase">
              Pers: <span id="cart-pers" class="text-gray-900">-</span>
            </p>
            <p class="text-sm font-black text-[#004d26] mt-2">
              Bs. <span id="cart-precio">200</span>.00
            </p>
          </div>
        </div>
      </div>

      <div class="p-6 border-t border-gray-100 bg-white">
        <div class="flex justify-between items-center mb-6">
          <span
            class="font-bold text-xs uppercase tracking-widest text-gray-400"
            >Total a pagar</span
          >
          <span class="font-black text-2xl text-gray-900"
            >Bs. <span id="cart-subtotal">200</span>.00</span
          >
        </div>
        <button
          onclick="window.location.href = 'checkout.html'"
          class="w-full bg-[#004d26] hover:bg-green-800 text-white py-4 rounded-xl font-black uppercase tracking-widest text-xs transition shadow-xl mb-4 flex items-center justify-center gap-2"
        >
          <i class="fa-solid fa-credit-card"></i> Continuar con el pago
        </button>
        <button
          onclick="window.location.href = 'carrito.html'"
          class="w-full text-center py-2 font-black text-[10px] uppercase tracking-widest text-gray-400 hover:text-blue-600 transition underline"
        >
          Ver Carrito Completo
        </button>
      </div>
    </div>

    <script>
      // Variables Base
      const precioBase = 200;
      const costoPersonalizacion = 50;
      const costoParche = 30;

      // Elementos UI
      const imgPrincipal = document.getElementById("main-product-img");
      const textTotal = document.getElementById("precio-total");
      const checkPersonalizar = document.getElementById("check-personalizar");
      const cajaPersonalizacion = document.getElementById(
        "caja-personalizacion",
      );
      const overlayTexto = document.getElementById(
        "texto-personalizado-overlay",
      );

      // Control de visibilidad del texto (solo se ve si está activada la espalda)
      let mostrandoEspalda = true;

      function cambiarImagenPrincipal(src, esEspalda) {
        imgPrincipal.style.opacity = 0;
        mostrandoEspalda = esEspalda;

        setTimeout(() => {
          imgPrincipal.src = src;
          imgPrincipal.style.opacity = 1;
          actualizarVisibilidadTexto();
        }, 200);
      }

      function actualizarVisibilidadTexto() {
        if (checkPersonalizar.checked && mostrandoEspalda) {
          overlayTexto.classList.remove("opacity-0");
        } else {
          overlayTexto.classList.add("opacity-0");
        }
      }

      function togglePersonalizacion() {
        if (checkPersonalizar.checked) {
          cajaPersonalizacion.classList.remove("hidden");
          document
            .getElementById("icono-pers")
            .classList.replace("fa-pen", "fa-check");
          document
            .getElementById("icono-pers")
            .classList.replace("text-gray-400", "text-yellow-500");
          document.getElementById("texto-pers").innerText =
            "Personalización Añadida";
          actualizarVisibilidadTexto();
        } else {
          cajaPersonalizacion.classList.add("hidden");
          document
            .getElementById("icono-pers")
            .classList.replace("fa-check", "fa-pen");
          document
            .getElementById("icono-pers")
            .classList.replace("text-yellow-500", "text-gray-400");
          document.getElementById("texto-pers").innerText =
            "Añadir Nombre y Número";
          document.getElementById("input-nombre").value = "";
          document.getElementById("input-numero").value = "";
          document.getElementById("preview-nombre").innerText = "";
          document.getElementById("preview-numero").innerText = "";
          actualizarVisibilidadTexto();
        }
      }

      // Live Preview Inputs
      document
        .getElementById("input-nombre")
        .addEventListener("input", function () {
          document.getElementById("preview-nombre").innerText = this.value;
        });
      document
        .getElementById("input-numero")
        .addEventListener("input", function () {
          document.getElementById("preview-numero").innerText = this.value;
        });

      function calcularTotal() {
        let total = precioBase;
        if (checkPersonalizar.checked) total += costoPersonalizacion;

        const parcheSeleccionado = document.querySelector(
          'input[name="parche"]:checked',
        ).value;
        if (parcheSeleccionado !== "ninguno") total += costoParche;

        textTotal.innerText = total;
      }

      // Funciones del Drawer (Vista Rápida)
      function toggleCart() {
        const drawer = document.getElementById("cart-drawer");
        const overlay = document.getElementById("cart-overlay");

        if (drawer.classList.contains("translate-x-full")) {
          drawer.classList.remove("translate-x-full");
          overlay.classList.remove("hidden");
        } else {
          drawer.classList.add("translate-x-full");
          overlay.classList.add("hidden");
        }
      }

      function procesarCompra() {
        // Recoger datos
        const equipacion = document.querySelector(
          'input[name="equipacion"]:checked',
        ).value;
        const talla = document.querySelector(
          'input[name="talla"]:checked',
        ).value;
        const total = textTotal.innerText;
        const nom = document.getElementById("input-nombre").value.toUpperCase();
        const num = document.getElementById("input-numero").value;

        // Llenar panel
        document.getElementById("cart-title").innerText =
          `Camiseta Oficial - ${equipacion}`;
        document.getElementById("cart-talla").innerText = talla;
        document.getElementById("cart-precio").innerText = total;
        document.getElementById("cart-subtotal").innerText = total;

        if (checkPersonalizar.checked && (nom || num)) {
          document.getElementById("cart-pers").innerText = `${nom} ${num}`;
        } else {
          document.getElementById("cart-pers").innerText = "Ninguna";
        }

        // Abrir Drawer
        toggleCart();
      }
    </script>
  </body>
</html>

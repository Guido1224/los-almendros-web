<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Módulo Historia | CD Los Almendros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <link
      href="https://cdn.quilljs.com/1.3.6/quill.snow.css"
      rel="stylesheet"
    />
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;700;900&display=swap");
      body {
        font-family: "Public Sans", sans-serif;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      #editor-container,
      #edit-editor-container {
        height: 300px;
        background: white;
        border-bottom-left-radius: 1rem;
        border-bottom-right-radius: 1rem;
      }
      .ql-toolbar {
        border-top-left-radius: 1rem;
        border-top-right-radius: 1rem;
        background: #f8fafc;
      }
    </style>
  </head>
  <body class="bg-gray-100 text-gray-900">
    <nav
      class="bg-[#004d26] py-3 px-4 md:px-8 flex justify-between items-center sticky top-0 z-50 shadow-xl border-b-4 border-yellow-500"
    >
      <a
        href="admin.html"
        class="text-[10px] font-black uppercase text-white/70 hover:text-white transition"
      >
        <i class="fa-solid fa-arrow-left mr-2"></i> Volver al Panel
      </a>

      <button
        onclick="abrirModalCrear()"
        class="text-[10px] font-black uppercase tracking-widest text-[#004d26] bg-yellow-500 hover:bg-yellow-400 px-4 py-1.5 rounded-full transition-all flex items-center gap-2 shadow-lg active:scale-95"
      >
        <i class="fa-solid fa-plus"></i> Nuevo Hito
      </button>
    </nav>

    <main class="container mx-auto max-w-6xl px-4 py-10">
      <header class="mb-10">
        <span
          class="text-[#004d26] font-black text-[10px] uppercase tracking-[0.4em] italic block mb-1"
          >Gestión de Relatos y Personajes</span
        >
        <h2
          class="text-4xl font-black uppercase italic tracking-tighter text-gray-800"
        >
          Módulo de Historia
        </h2>
        <p class="text-gray-500 text-xs font-bold uppercase mt-2">
          Administra los hitos históricos, expresidentes y leyendas que forjaron
          la identidad del club.
        </p>
      </header>
      <div
        class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4"
      >
        <h2
          class="text-3xl font-black uppercase italic text-[#004d26] tracking-tighter"
        >
          Registros Históricos
        </h2>
        <div class="relative w-full md:w-72">
          <input
            type="text"
            id="buscador"
            onkeyup="filtrarHistoria()"
            placeholder="Buscar hito o presidente..."
            class="w-full pl-10 pr-4 py-2.5 rounded-full border border-gray-300 focus:border-[#004d26] outline-none text-sm font-bold shadow-sm"
          />
          <i
            class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"
          ></i>
        </div>
      </div>

      <div
        class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100"
      >
        <div class="overflow-x-auto no-scrollbar">
          <table class="w-full text-left">
            <thead>
              <tr
                class="bg-gray-50 border-b border-gray-100 text-[10px] font-black uppercase text-gray-400 tracking-widest"
              >
                <th class="px-8 py-5">Imagen</th>
                <th class="px-8 py-5">Categoría / Título</th>
                <th class="px-8 py-5">Periodo</th>
                <th class="px-8 py-5 text-center">Acciones</th>
              </tr>
            </thead>
            <tbody
              id="tabla-historia-body"
              class="divide-y divide-gray-50 text-sm"
            ></tbody>
          </table>
        </div>
      </div>
    </main>

    <div
      id="modal-historia"
      class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] hidden flex items-center justify-center p-4"
    >
      <div
        class="bg-white w-full max-w-4xl rounded-[3rem] overflow-hidden shadow-2xl flex flex-col max-h-[90vh]"
      >
        <div
          class="bg-[#004d26] p-6 text-white flex justify-between items-center border-b-4 border-yellow-500"
        >
          <h3
            id="modal-titulo"
            class="font-black uppercase italic tracking-tighter text-lg"
          >
            Nuevo Registro Histórico
          </h3>
          <button
            onclick="cerrarModal()"
            class="w-10 h-10 rounded-full bg-white/10 hover:bg-red-500 transition-colors flex items-center justify-center"
          >
            <i class="fa-solid fa-xmark text-xl"></i>
          </button>
        </div>

        <div class="p-8 overflow-y-auto no-scrollbar">
          <form id="form-historia" class="space-y-6">
            <input type="hidden" id="edit-id" />

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div
                class="flex flex-col items-center bg-gray-50 p-4 rounded-2xl border border-gray-200"
              >
                <div
                  class="w-full h-40 rounded-xl overflow-hidden shadow-md mb-4 bg-gray-200 flex items-center justify-center"
                >
                  <img
                    id="preview-img"
                    src=""
                    class="w-full h-full object-cover hidden"
                  />
                  <i
                    id="preview-icon"
                    class="fa-solid fa-image text-4xl text-gray-400"
                  ></i>
                </div>
                <label
                  class="bg-[#004d26] text-white text-[10px] font-black uppercase px-4 py-2 rounded-full cursor-pointer hover:bg-green-800 transition"
                >
                  <i class="fa-solid fa-upload mr-2"></i> Seleccionar Foto
                  <input
                    type="file"
                    id="input-foto"
                    accept="image/*"
                    class="hidden"
                    onchange="previewImagen(event)"
                  />
                </label>
              </div>

              <div class="md:col-span-2 space-y-4">
                <div>
                  <label
                    class="text-[10px] font-black uppercase text-gray-400 block mb-1"
                    >Categoría</label
                  >
                  <select
                    id="categoria"
                    class="w-full border-b-2 border-gray-200 focus:border-[#004d26] outline-none py-2 font-bold uppercase"
                  >
                    <option value="Decada">Década a Década</option>
                    <option value="Presidente">Presidente</option>
                    <option value="Jugador Historico">Jugador Histórico</option>
                    <option value="Entrenador">Entrenador Histórico</option>
                  </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                  <div>
                    <label
                      class="text-[10px] font-black uppercase text-gray-400 block mb-1"
                      >Periodo</label
                    >
                    <input
                      type="text"
                      id="periodo"
                      placeholder="Ej: 1988-96"
                      class="w-full border-b-2 border-gray-200 focus:border-[#004d26] outline-none py-2 font-bold uppercase"
                    />
                  </div>
                  <div>
                    <label
                      class="text-[10px] font-black uppercase text-gray-400 block mb-1"
                      >Orden</label
                    >
                    <input
                      type="number"
                      id="orden"
                      value="0"
                      class="w-full border-b-2 border-gray-200 focus:border-[#004d26] outline-none py-2 font-bold"
                    />
                  </div>
                </div>
                <div>
                  <label
                    class="text-[10px] font-black uppercase text-gray-400 block mb-1"
                    >Título</label
                  >
                  <input
                    type="text"
                    id="titulo"
                    placeholder="Título del capítulo"
                    class="w-full border-b-2 border-gray-200 focus:border-[#004d26] outline-none py-2 font-black text-lg uppercase"
                  />
                </div>
              </div>
            </div>

            <div>
              <label
                class="text-[10px] font-black uppercase text-gray-400 block mb-2"
                >Relato Histórico Detallado</label
              >
              <div id="editor-container"></div>
            </div>

            <button
              type="submit"
              id="btn-guardar"
              class="w-full bg-[#004d26] text-white font-black uppercase py-5 rounded-full shadow-2xl hover:bg-green-800 transition-all tracking-[0.2em] text-xs"
            >
              Guardar en la Historia Oficial
            </button>
          </form>
        </div>
      </div>
    </div>

    <script>
      let historiaData = [];
      let quill;

      window.onload = () => {
        quill = new Quill("#editor-container", {
          theme: "snow",
          modules: {
            toolbar: [
              [{ header: [2, 3, false] }],
              ["bold", "italic", "underline"],
              [{ list: "ordered" }, { list: "bullet" }],
              ["link", "clean"],
              ["link", "image", "clean"],
            ],
          },
        });
        cargarHistoria();
      };

      async function cargarHistoria() {
        const { data } = await _supabase
          .from("historia")
          .select("*")
          .order("orden", { ascending: true });
        historiaData = data || [];
        renderizarTabla();
      }

      function renderizarTabla() {
        const body = document.getElementById("tabla-historia-body");
        body.innerHTML = historiaData
          .map(
            (h) => `
                <tr class="hover:bg-gray-50/80 transition-colors">
                    <td class="px-8 py-5">
                        <img src="${h.imagen_portada}" class="w-16 h-12 rounded-lg object-cover shadow-sm">
                    </td>
                    <td class="px-8 py-5">
                        <p class="text-[9px] font-black text-[#004d26] uppercase mb-0.5">${h.categoria}</p>
                        <h4 class="text-sm font-black text-gray-800 uppercase italic">${h.titulo}</h4>
                    </td>
                    <td class="px-8 py-5 font-bold text-gray-400 italic">${h.periodo}</td>
                    <td class="px-8 py-5 text-center">
                        <div class="flex justify-center gap-3">
                            <button onclick="abrirEditor(${h.id})" class="w-9 h-9 rounded-full bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition-all flex items-center justify-center"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button onclick="eliminarHito(${h.id})" class="w-9 h-9 rounded-full bg-red-50 text-red-600 hover:bg-red-600 hover:text-white transition-all flex items-center justify-center"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `,
          )
          .join("");
      }

      async function uploadImagen(file) {
        const fileExt = file.name.split(".").pop();
        const fileName = `${Math.random()}.${fileExt}`;
        const { data, error } = await _supabase.storage
          .from("historia")
          .upload(fileName, file);
        if (error) throw error;
        const { data: urlData } = _supabase.storage
          .from("historia")
          .getPublicUrl(data.path);
        return urlData.publicUrl;
      }

      function previewImagen(event) {
        const reader = new FileReader();
        reader.onload = () => {
          const img = document.getElementById("preview-img");
          img.src = reader.result;
          img.classList.remove("hidden");
          document.getElementById("preview-icon").classList.add("hidden");
        };
        reader.readAsDataURL(event.target.files[0]);
      }

      document.getElementById("form-historia").onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btn-guardar");
        btn.disabled = true;
        btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> PROCESANDO...`;

        try {
          let imgUrl = document.getElementById("preview-img").src;
          const fileInput = document.getElementById("input-foto");
          const file = fileInput.files[0];

          // Solo intentamos subir si hay un archivo nuevo seleccionado
          if (file) {
            console.log("Subiendo imagen...");
            imgUrl = await uploadImagen(file);
          } else if (imgUrl.includes("base64")) {
            // Si no hay archivo y la imagen es un preview base64 (y no una URL real)
            imgUrl = ""; // Evitamos guardar basura si no se subió foto
          }

          const id = document.getElementById("edit-id").value;
          const payload = {
            categoria: document.getElementById("categoria").value,
            periodo: document.getElementById("periodo").value,
            titulo: document.getElementById("titulo").value.toUpperCase(),
            orden: parseInt(document.getElementById("orden").value) || 0,
            contenido: quill.root.innerHTML,
            imagen_portada: imgUrl,
          };

          console.log("Enviando datos a Supabase:", payload);

          let response;
          if (id) {
            response = await _supabase
              .from("historia")
              .update(payload)
              .eq("id", id)
              .select();
          } else {
            response = await _supabase
              .from("historia")
              .insert([payload])
              .select();
          }

          // --- AQUÍ ESTÁ LA CLAVE: VALIDAMOS EL ERROR ---
          if (response.error) {
            console.error("Error de Supabase:", response.error);
            alert("❌ ERROR DE BASE DE DATOS: " + response.error.message);
          } else {
            alert("✅ CAPÍTULO GUARDADO EXITOSAMENTE EN LA NUBE");
            cerrarModal();
            cargarHistoria();
          }
        } catch (err) {
          console.error("Error técnico:", err);
          alert("❌ ERROR TÉCNICO: " + err.message);
        } finally {
          btn.disabled = false;
          btn.innerText = "Guardar en la Historia Oficial";
        }
      };

      function abrirModalCrear() {
        document.getElementById("form-historia").reset();
        document.getElementById("edit-id").value = "";
        document.getElementById("preview-img").classList.add("hidden");
        document.getElementById("preview-icon").classList.remove("hidden");
        quill.root.innerHTML = "";
        document.getElementById("modal-historia").classList.remove("hidden");
      }

      function abrirEditor(id) {
        const h = historiaData.find((x) => x.id === id);
        document.getElementById("edit-id").value = h.id;
        document.getElementById("categoria").value = h.categoria;
        document.getElementById("periodo").value = h.periodo;
        document.getElementById("titulo").value = h.titulo;
        document.getElementById("orden").value = h.orden;
        document.getElementById("preview-img").src = h.imagen_portada;
        document.getElementById("preview-img").classList.remove("hidden");
        document.getElementById("preview-icon").classList.add("hidden");
        quill.root.innerHTML = h.contenido;
        document.getElementById("modal-historia").classList.remove("hidden");
      }

      function cerrarModal() {
        document.getElementById("modal-historia").classList.add("hidden");
      }

      async function eliminarHito(id) {
        if (confirm("¿Borrar definitivamente?")) {
          await _supabase.from("historia").delete().eq("id", id);
          cargarHistoria();
        }
      }
    </script>
  </body>
</html>

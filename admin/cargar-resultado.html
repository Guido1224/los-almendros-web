<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cargar Resultado | Mando Presidencial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <style>
      body {
        max-width: 100%;
        overflow-x: hidden;
      }
      /* Quitamos el filtro invertido para que los iconos se vean bien en blanco */
      input[type="date"]::-webkit-calendar-picker-indicator,
      input[type="time"]::-webkit-calendar-picker-indicator {
        filter: none;
      }
      .hidden {
        display: none !important;
      }
      .animate-fade-in {
        animation: fadeIn 0.3s ease-in-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 5px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #004d26;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="bg-gray-100 text-gray-900 min-h-screen">
    <nav
      class="bg-[#004d26] p-4 flex justify-between items-center sticky top-0 z-50 shadow-xl"
    >
      <a
        href="admin.html"
        class="text-[10px] font-black uppercase tracking-widest text-white/70 hover:text-white transition"
      >
        <i class="fa-solid fa-arrow-left mr-2"></i> Volver al Panel
      </a>
      <div
        class="font-black italic text-sm tracking-tighter uppercase text-white"
      >
        CD LOS ALMENDROS
      </div>
    </nav>

    <main class="container mx-auto max-w-4xl p-6 lg:py-12">
      <header class="mb-10">
        <span
          class="text-[#004d26] font-black text-[10px] uppercase tracking-[0.4em] italic"
          >Módulo Oficial</span
        >
        <h2
          class="text-4xl font-black uppercase italic tracking-tighter text-gray-800"
        >
          Cargar Encuentro
        </h2>
        <p class="text-gray-500 text-xs font-bold uppercase mt-2">
          Registra la ficha técnica completa del partido y su escudo
        </p>
      </header>

      <form id="formResultado" class="space-y-8">
        <div
          class="bg-white p-8 rounded-[2.5rem] border border-gray-200 shadow-xl"
        >
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label
                class="block text-[10px] font-black text-gray-500 uppercase mb-3 ml-2"
                >Competición</label
              >
              <select
                id="competicion"
                onchange="verificarNuevaCompeticion(this.value)"
                class="w-full bg-gray-50 border border-gray-200 p-4 rounded-2xl outline-none focus:border-[#004d26] text-sm font-bold text-gray-800"
              >
                <option value="Liga">La Liga</option>
                <option value="Copa Riberalta">Copa Riberalta</option>
                <option value="Copa Pre Simon Bolivar">
                  Copa Pre Simón Bolívar
                </option>
                <option value="Copa Simon Bolivar">Copa Simón Bolívar</option>
                <option value="Amistoso">Partido Amistoso</option>
                <option value="NUEVA" class="text-yellow-600 font-black">
                  -- Agregar Nueva --
                </option>
              </select>
              <div
                id="contenedor-nueva-comp"
                class="mt-4 hidden animate-fade-in"
              >
                <input
                  type="text"
                  id="nueva-competicion"
                  placeholder="Nombre de la nueva competición"
                  class="w-full bg-yellow-50 border border-yellow-200 p-4 rounded-2xl outline-none focus:border-yellow-500 text-sm font-bold uppercase text-yellow-700"
                />
              </div>
            </div>
            <div>
              <label
                class="block text-[10px] font-black text-gray-500 uppercase mb-3 ml-2"
                >Jornada / Etapa</label
              >
              <input
                type="text"
                id="jornada"
                required
                placeholder="Ej. Jornada 5"
                class="w-full bg-gray-50 border border-gray-200 p-4 rounded-2xl outline-none focus:border-[#004d26] text-sm font-bold uppercase text-gray-800"
              />
            </div>
          </div>
        </div>

        <div
          class="bg-white p-8 rounded-[2.5rem] border border-gray-200 shadow-xl"
        >
          <h3
            class="text-[#004d26] font-black text-[10px] uppercase tracking-widest mb-6 border-b border-gray-100 pb-2"
          >
            Identidad del Rival
          </h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
              <label
                class="block text-[10px] font-black text-gray-500 uppercase ml-2"
                >Escudo del Rival</label
              >
              <div class="relative">
                <input
                  type="file"
                  id="rival-escudo-file"
                  accept="image/*"
                  class="hidden"
                  onchange="updateFileName(this)"
                />
                <label
                  for="rival-escudo-file"
                  class="w-full bg-gray-50 border-2 border-dashed border-gray-200 p-6 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:border-[#004d26] transition group"
                >
                  <i
                    class="fa-solid fa-cloud-arrow-up text-xl text-gray-400 group-hover:text-[#004d26] mb-2"
                  ></i>
                  <span
                    id="file-name"
                    class="text-[10px] font-black uppercase text-gray-400 text-center"
                    >Subir Archivo Manual</span
                  >
                </label>
              </div>
            </div>
            <div class="flex flex-col justify-end space-y-4">
              <label
                class="block text-[10px] font-black text-gray-400 uppercase ml-2 italic text-center md:text-left"
                >Atajo de Liga</label
              >
              <button
                type="button"
                onclick="abrirModalEquipos()"
                class="w-full h-[88px] bg-blue-600 hover:bg-blue-700 rounded-2xl text-white font-black uppercase text-[10px] tracking-widest transition shadow-lg"
              >
                <i class="fa-solid fa-shield-halved text-xl mb-1 block"></i>
                Seleccionar Equipo BD
              </button>
            </div>
          </div>
        </div>

        <div
          class="bg-white p-8 rounded-[3rem] text-black shadow-2xl border border-gray-200 relative overflow-hidden"
        >
          <div class="absolute top-0 left-0 w-full h-2 bg-[#004d26]"></div>
          <div
            class="flex flex-col md:flex-row items-center justify-between space-y-8 md:space-y-0 relative z-10"
          >
            <div class="text-center w-32">
              <div
                class="w-20 h-20 bg-gray-50 rounded-full mx-auto mb-3 flex items-center justify-center font-black text-2xl border-2 border-[#004d26] text-[#004d26]"
              >
                AL
              </div>
              <p class="font-black text-sm uppercase text-gray-800">
                Almendros
              </p>
              <input
                type="number"
                id="golesAlmendros"
                min="0"
                value="0"
                class="mt-4 w-20 h-24 text-center text-5xl font-black bg-gray-50 rounded-2xl shadow-inner border border-gray-100 outline-none text-gray-900"
              />
            </div>
            <div
              class="text-3xl font-black text-gray-200 italic uppercase tracking-tighter"
            >
              VS
            </div>
            <div class="text-center w-32">
              <input
                type="text"
                id="rival"
                required
                placeholder="RIVAL"
                class="mb-3 block w-full text-center font-black text-sm uppercase border-b-2 border-gray-100 outline-none focus:border-red-500 text-gray-800 bg-transparent"
              />
              <div
                id="caja-escudo-rival"
                class="w-20 h-20 bg-gray-50 rounded-full mx-auto mb-3 flex items-center justify-center font-black text-2xl border-2 border-gray-200 text-gray-300 italic overflow-hidden"
              >
                <span id="texto-rv">RV</span>
                <img
                  id="img-rv"
                  src=""
                  class="w-full h-full object-contain hidden p-2"
                />
              </div>
              <input
                type="number"
                id="golesRival"
                min="0"
                value="0"
                class="mt-4 w-20 h-24 text-center text-5xl font-black bg-gray-50 rounded-2xl shadow-inner border border-gray-100 text-red-600 outline-none"
              />
            </div>
          </div>
        </div>

        <div
          class="bg-white p-8 rounded-[2.5rem] border border-gray-200 shadow-xl"
        >
          <h3
            class="text-[#004d26] font-black text-[10px] uppercase tracking-widest mb-6 border-b border-gray-100 pb-2"
          >
            Información y Sucesos
          </h3>
          <div class="flex gap-2 mb-4">
            <button
              type="button"
              onclick="anadirEventoManual('⚽ GOL: ')"
              class="bg-green-50 text-green-700 px-3 py-2 rounded-xl text-[9px] font-black uppercase border border-green-100"
            >
              + Gol
            </button>
            <button
              type="button"
              onclick="anadirEventoManual('🟨 AMARILLA: ')"
              class="bg-yellow-50 text-yellow-700 px-3 py-2 rounded-xl text-[9px] font-black uppercase border border-yellow-100"
            >
              + Amarilla
            </button>
            <button
              type="button"
              onclick="anadirEventoManual('🟥 ROJA: ')"
              class="bg-red-50 text-red-700 px-3 py-2 rounded-xl text-[9px] font-black uppercase border border-red-100"
            >
              + Roja
            </button>
          </div>
          <textarea
            id="incidencias"
            rows="4"
            placeholder="Ej: 23' - GOL DE MAMANI&#10;45' - AMARILLA PARA..."
            class="w-full bg-gray-50 border border-gray-200 p-5 rounded-2xl text-xs font-bold text-gray-800 outline-none focus:border-[#004d26] custom-scrollbar"
          ></textarea>
        </div>

        <div
          class="bg-white p-8 rounded-[2.5rem] border border-gray-200 shadow-xl"
        >
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
              <label
                class="block text-[10px] font-black text-gray-500 uppercase mb-3 ml-2"
                >Fecha</label
              >
              <input
                type="date"
                id="fecha"
                required
                class="w-full bg-gray-50 border border-gray-200 p-4 rounded-2xl outline-none text-sm font-bold text-gray-800"
              />
            </div>
            <div>
              <label
                class="block text-[10px] font-black text-gray-500 uppercase mb-3 ml-2"
                >Hora</label
              >
              <input
                type="time"
                id="hora"
                required
                class="w-full bg-gray-50 border border-gray-200 p-4 rounded-2xl outline-none text-sm font-bold text-gray-800"
              />
            </div>
            <div>
              <label
                class="block text-[10px] font-black text-gray-500 uppercase mb-3 ml-2"
                >Estadio</label
              >
              <input
                type="text"
                id="estadio"
                required
                placeholder="Estadio Municipal"
                class="w-full bg-gray-50 border border-gray-200 p-4 rounded-2xl outline-none text-sm font-bold uppercase text-gray-800"
              />
            </div>
          </div>
        </div>

        <button
          type="submit"
          id="btnPublicar"
          class="w-full bg-[#004d26] hover:bg-[#003d1e] py-6 rounded-[2rem] text-white font-black uppercase text-xs tracking-[0.3em] transition-all shadow-xl active:scale-95"
        >
          Publicar Resultado Oficial
        </button>
      </form>
    </main>

    <div
      id="modal-equipos"
      class="fixed inset-0 z-[200] hidden bg-black/60 backdrop-blur-sm flex items-center justify-center p-4"
    >
      <div
        class="bg-white w-full max-w-2xl rounded-[2.5rem] border border-gray-200 shadow-2xl overflow-hidden flex flex-col max-h-[90vh]"
      >
        <div
          class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50"
        >
          <h3
            class="font-black uppercase italic text-sm tracking-tighter text-blue-600"
          >
            Base de Datos de Equipos
          </h3>
          <button
            onclick="cerrarModalEquipos()"
            class="text-gray-400 hover:text-red-500 transition"
          >
            <i class="fa-solid fa-xmark text-xl"></i>
          </button>
        </div>
        <div
          id="lista-equipos-db"
          class="p-6 grid grid-cols-2 md:grid-cols-3 gap-4 overflow-y-auto custom-scrollbar"
        ></div>
        <div class="p-6 bg-gray-50 border-t border-gray-100">
          <p
            class="text-[9px] font-black uppercase text-yellow-600 mb-4 italic"
          >
            Agregar o Actualizar Club
          </p>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input
              type="text"
              id="nuevo-equipo-nombre"
              placeholder="NOMBRE DEL CLUB"
              class="bg-white border border-gray-200 p-3 rounded-xl text-xs uppercase font-bold text-gray-800 outline-none"
            />
            <input
              type="file"
              id="nuevo-equipo-file"
              class="text-[10px] text-gray-500"
            />
          </div>
          <button
            onclick="guardarEquipoEnBase()"
            id="btn-guardar-db"
            class="w-full mt-4 bg-green-600 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-green-700 transition"
          >
            Registrar en Base de Datos
          </button>
        </div>
      </div>
    </div>

    <script>
      let urlEscudoSeleccionado = null;

      function anadirEventoManual(texto) {
        const area = document.getElementById("incidencias");
        area.value += (area.value ? "\n" : "") + texto;
        area.focus();
      }

      function actualizarPreviewEscudo(url) {
        document.getElementById("texto-rv").classList.add("hidden");
        const imgRv = document.getElementById("img-rv");
        imgRv.src = url;
        imgRv.classList.remove("hidden");
      }

      function updateFileName(input) {
        if (input.files && input.files[0]) {
          document.getElementById("file-name").innerText = input.files[0].name;
          const tempUrl = URL.createObjectURL(input.files[0]);
          actualizarPreviewEscudo(tempUrl);
          urlEscudoSeleccionado = null;
        }
      }

      function verificarNuevaCompeticion(valor) {
        const contenedor = document.getElementById("contenedor-nueva-comp");
        if (valor === "NUEVA") {
          contenedor.classList.remove("hidden");
          document.getElementById("nueva-competicion").focus();
        } else {
          contenedor.classList.add("hidden");
        }
      }

      async function abrirModalEquipos() {
        document.getElementById("modal-equipos").classList.remove("hidden");
        const { data } = await _supabase
          .from("equipos")
          .select("*")
          .order("nombre", { ascending: true });
        const contenedor = document.getElementById("lista-equipos-db");
        contenedor.innerHTML =
          data
            ?.map(
              (e) => `
            <div onclick="seleccionarEquipo('${e.nombre}', '${e.escudo_url}')" class="bg-gray-50 p-4 rounded-2xl border border-gray-100 hover:border-blue-500 cursor-pointer transition text-center group">
                <img src="${e.escudo_url}" class="w-12 h-12 object-contain mx-auto mb-2 group-hover:scale-110 transition">
                <p class="text-[9px] font-black uppercase truncate text-gray-700">${e.nombre}</p>
            </div>`,
            )
            .join("") || "";
      }

      function cerrarModalEquipos() {
        document.getElementById("modal-equipos").classList.add("hidden");
      }

      function seleccionarEquipo(nombre, url) {
        document.getElementById("rival").value = nombre;
        urlEscudoSeleccionado = url;
        document.getElementById("file-name").innerText =
          "✨ ESCUDO SELECCIONADO";
        document.getElementById("file-name").className =
          "text-[10px] font-black uppercase text-blue-600 text-center";
        actualizarPreviewEscudo(url);
        cerrarModalEquipos();
      }

      async function guardarEquipoEnBase() {
        const nombre = document
          .getElementById("nuevo-equipo-nombre")
          .value.toUpperCase();
        const file = document.getElementById("nuevo-equipo-file").files[0];
        if (!nombre || !file) return alert("Completa los datos");
        const fileName = `base_${nombre}_${Date.now()}.${file.name.split(".").pop()}`;
        await _supabase.storage.from("escudos").upload(fileName, file);
        const { data: urlData } = _supabase.storage
          .from("escudos")
          .getPublicUrl(fileName);
        await _supabase
          .from("equipos")
          .upsert(
            { nombre, escudo_url: urlData.publicUrl },
            { onConflict: "nombre" },
          );
        alert("✅ CLUB GUARDADO");
        abrirModalEquipos();
      }

      document
        .getElementById("formResultado")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = document.getElementById("btnPublicar");
          btn.disabled = true;
          btn.innerText = "PUBLICANDO...";

          const selComp = document.getElementById("competicion").value;
          const compFinal =
            selComp === "NUEVA"
              ? document.getElementById("nueva-competicion").value.trim()
              : selComp;

          const fileManual =
            document.getElementById("rival-escudo-file").files[0];
          let publicUrl = urlEscudoSeleccionado;

          if (fileManual) {
            const fileName = `escudo_res_${Date.now()}.${fileManual.name.split(".").pop()}`;
            await _supabase.storage
              .from("escudos")
              .upload(fileName, fileManual);
            publicUrl = _supabase.storage.from("escudos").getPublicUrl(fileName)
              .data.publicUrl;
          }

          const datos = {
            rival: document.getElementById("rival").value.toUpperCase(),
            rival_escudo: publicUrl,
            jornada: document.getElementById("jornada").value.toUpperCase(),
            competicion: compFinal.toUpperCase(),
            fecha: document.getElementById("fecha").value,
            hora: document.getElementById("hora").value,
            ubicacion: document.getElementById("estadio").value.toUpperCase(),
            goles_almendros: parseInt(
              document.getElementById("golesAlmendros").value,
            ),
            goles_rival: parseInt(document.getElementById("golesRival").value),
            incidencias: document.getElementById("incidencias").value, // <-- NUEVO DATO GUARDADO
            creado_en: new Date(),
          };

          const { error } = await _supabase.from("partidos").insert([datos]);
          if (!error) {
            alert("✅ ÉXITO");
            window.location.href = "admin.html";
          } else {
            alert("Error: " + error.message);
            btn.disabled = false;
            btn.innerText = "Publicar";
          }
        });
    </script>
  </body>
</html>

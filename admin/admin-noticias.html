<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Redacción de Élite | CD Los Almendros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/auth-guard.js"></script>
    <link
      href="https://cdn.quilljs.com/1.3.6/quill.snow.css"
      rel="stylesheet"
    />
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;700;900&display=swap");
      body {
        font-family: "Public Sans", sans-serif;
      }

      #editor-container {
        height: 450px;
        background: white;
        border-bottom-left-radius: 1.5rem;
        border-bottom-right-radius: 1.5rem;
        font-size: 1.1rem;
      }
      .ql-toolbar {
        border-top-left-radius: 1.5rem;
        border-top-right-radius: 1.5rem;
        background: #f8fafc;
        border-color: #e2e8f0 !important;
      }
      .ql-container {
        border-color: #e2e8f0 !important;
      }

      /* Toggle Portada */
      .switch {
        position: relative;
        display: inline-block;
        width: 50px;
        height: 24px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #cbd5e1;
        transition: 0.4s;
        border-radius: 24px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: #eab308;
      }
      input:checked + .slider:before {
        transform: translateX(26px);
      }

      .border-required {
        border-color: #ef4444 !important;
        background-color: #fef2f2;
      }
    </style>
  </head>
  <body
    id="cuerpo-protegido"
    class="bg-gray-100 text-gray-900 opacity-0 transition-opacity duration-500"
  >
    <nav
      class="bg-[#004d26] p-4 flex justify-between items-center sticky top-0 z-50 shadow-lg border-b-2 border-yellow-500"
    >
      <a
        href="admin.html"
        class="text-[10px] font-black uppercase text-white/70 hover:text-white transition"
      >
        <i class="fa-solid fa-arrow-left mr-2"></i> Volver al Panel
      </a>
      <div
        class="font-black italic text-sm tracking-tighter uppercase text-white"
      >
        CD LOS ALMENDROS
      </div>
    </nav>

    <main class="container mx-auto max-w-5xl p-6 lg:py-12">
      <header
        class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4"
      >
        <div>
          <h2
            class="text-4xl md:text-5xl font-black uppercase italic tracking-tighter text-[#004d26] leading-none"
          >
            Nueva Publicación
          </h2>
          <p
            class="text-gray-400 text-xs font-bold uppercase tracking-widest mt-2"
          >
            Configura el contenido oficial del club
          </p>
        </div>

        <div
          class="bg-white border-2 border-yellow-500/30 p-4 rounded-2xl flex items-center gap-4 shadow-sm"
        >
          <div class="text-right">
            <p class="text-[10px] font-black uppercase text-[#004d26]">
              ¿Es Noticia de Portada?
            </p>
            <p class="text-[9px] font-bold text-gray-400 uppercase">
              Aparecerá en el banner principal
            </p>
          </div>
          <label class="switch">
            <input type="checkbox" id="check-principal" />
            <span class="slider"></span>
          </label>
        </div>
      </header>

      <form id="formNoticia" class="space-y-8">
        <div
          class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-gray-100 grid grid-cols-1 md:grid-cols-3 gap-8"
        >
          <div class="md:col-span-2 space-y-2">
            <label
              class="text-[10px] font-black text-gray-400 uppercase ml-2 tracking-widest"
              >Título Impactante</label
            >
            <input
              type="text"
              id="noticia-titulo"
              required
              placeholder="ESCRIBE EL TITULAR AQUÍ..."
              class="w-full bg-gray-50 border-b-4 border-gray-100 p-4 rounded-xl outline-none focus:border-[#004d26] text-xl font-black uppercase transition-all"
            />
          </div>
          <div class="space-y-2">
            <label
              class="text-[10px] font-black text-gray-400 uppercase ml-2 tracking-widest"
              >Categoría / Etiqueta</label
            >
            <select
              id="noticia-tag"
              class="w-full bg-gray-50 border-b-4 border-gray-100 p-4 rounded-xl outline-none text-sm font-black uppercase focus:border-[#004d26]"
            >
              <option value="Club">Club</option>
              <option value="Primer Equipo">Primer Equipo</option>
              <option value="Juveniles">Juveniles</option>
              <option value="Femenino">Femenino</option>
              <option value="Comunicado">Comunicado Oficial</option>
            </select>
          </div>
        </div>

        <div
          class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-gray-100"
        >
          <label
            class="text-[10px] font-black uppercase text-gray-400 ml-2 tracking-widest mb-4 block"
            >Imagen de Portada
            <span class="text-red-500">(REQUERIDO)</span></label
          >
          <div id="drop-area" class="relative group">
            <input
              type="file"
              id="noticia-img"
              accept="image/*"
              class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
            />
            <div
              class="w-full bg-gray-50 border-2 border-dashed border-gray-200 p-12 rounded-2xl text-center group-hover:border-[#004d26] transition-all"
            >
              <i
                class="fa-solid fa-camera text-3xl text-gray-300 group-hover:text-[#004d26] mb-3 transition-colors"
              ></i>
              <p
                id="label-img"
                class="text-xs font-bold text-gray-400 uppercase tracking-widest"
              >
                Selecciona la foto principal
              </p>
              <p
                id="file-name"
                class="text-[#004d26] text-[10px] font-black mt-2 uppercase"
              ></p>
            </div>
          </div>
        </div>

        <div
          class="bg-white shadow-xl rounded-[2.5rem] overflow-hidden border border-gray-100"
        >
          <div
            class="p-5 bg-gray-50 border-b border-gray-100 flex justify-between items-center"
          >
            <span
              class="text-[10px] font-black text-gray-400 uppercase ml-2 tracking-widest"
              >Cuerpo de la Noticia</span
            >
          </div>
          <div id="editor-container"></div>
        </div>

        <button
          type="submit"
          id="btn-publicar"
          class="w-full bg-[#004d26] text-white py-6 rounded-[2rem] font-black uppercase text-sm tracking-[0.4em] hover:bg-green-800 shadow-2xl flex items-center justify-center gap-4 transition-all"
        >
          <i class="fa-solid fa-paper-plane"></i> LANZAR PUBLICACIÓN OFICIAL
        </button>
      </form>
    </main>

    <script>
      const quill = new Quill("#editor-container", {
        theme: "snow",
        placeholder: "Comienza a escribir la noticia...",
        modules: {
          toolbar: [
            [{ header: [2, 3, false] }],
            ["bold", "italic", "underline"],
            [{ list: "ordered" }, { list: "bullet" }],
            ["image", "link"],
            ["clean"],
          ],
        },
      });

      document.getElementById("noticia-img").onchange = function () {
        if (this.files.length > 0) {
          document.getElementById("file-name").innerText =
            "✅ SELECCIONADO: " + this.files[0].name;
          document
            .getElementById("drop-area")
            .children[1].classList.remove("border-required");
        }
      };

      document
        .getElementById("formNoticia")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = document.getElementById("btn-publicar");
          const file = document.getElementById("noticia-img").files[0];

          if (!file) {
            alert("🚨 ¡ALTO PRESIDENTE! Se requiere una imagen de portada.");
            document
              .getElementById("drop-area")
              .children[1].classList.add("border-required");
            return;
          }

          btn.disabled = true;
          btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin text-xl"></i> PUBLICANDO...`;

          try {
            const fileName = `noticia_${Date.now()}.${file.name.split(".").pop()}`;
            await _supabase.storage.from("noticias").upload(fileName, file);
            const publicUrl = _supabase.storage
              .from("noticias")
              .getPublicUrl(fileName).data.publicUrl;

            const esPrincipal =
              document.getElementById("check-principal").checked;
            if (esPrincipal) {
              await _supabase
                .from("noticias")
                .update({ es_noticia_principal: false })
                .eq("es_noticia_principal", true);
            }

            const { error } = await _supabase.from("noticias").insert([
              {
                titulo: document
                  .getElementById("noticia-titulo")
                  .value.toUpperCase(),
                etiqueta: document
                  .getElementById("noticia-tag")
                  .value.toUpperCase(),
                cuerpo: quill.root.innerHTML,
                imagen_principal_url: publicUrl,
                es_noticia_principal: esPrincipal,
                creado_en: new Date().toISOString(),
              },
            ]);

            if (error) throw error;

            alert("✅ PUBLICACIÓN EXITOSA");
            window.location.href = "gestionar-noticias.html"; // Después de publicar, si te envío a la lista para que veas el resultado.
          } catch (err) {
            alert("Error: " + err.message);
            btn.disabled = false;
            btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> LANZAR PUBLICACIÓN OFICIAL`;
          }
        });
    </script>
  </body>
</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Clasificación | GRAF Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;700;900&display=swap");
      body {
        font-family: "Public Sans", sans-serif;
      }
      .input-tabla {
        background: transparent;
        border: 1px solid transparent;
        text-align: center;
        width: 40px;
        font-weight: 700;
        border-radius: 4px;
        font-size: 10px;
      }
      .input-tabla:focus {
        background: white;
        border-color: #004d26;
        outline: none;
        box-shadow: 0 0 5px rgba(0, 77, 38, 0.2);
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .modal-bg {
        background-color: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <header
      class="bg-[#004d26] py-3 px-6 text-white flex justify-between items-center shadow-md sticky top-0 z-[60]"
    >
      <a
        href="admin.html"
        class="flex items-center gap-3 hover:text-yellow-500 transition-colors"
      >
        <i class="fa-solid fa-chevron-left text-xs"></i>
        <span class="font-black italic text-[10px] uppercase tracking-tighter"
          >Panel Central</span
        >
      </a>
      <span
        class="font-black italic text-[10px] uppercase tracking-tighter text-yellow-500"
        >GRAF - Sistema de Competiciones</span
      >
    </header>

    <main class="container mx-auto max-w-7xl px-4 py-10">
      <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
        <aside class="xl:col-span-3 space-y-6">
          <div
            class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100"
          >
            <h3
              class="font-black uppercase italic mb-4 text-[#004d26] text-[10px] flex items-center gap-2"
            >
              <i class="fa-solid fa-trophy"></i> Nueva Competición
            </h3>
            <form id="form-torneo" class="space-y-3">
              <input
                type="text"
                id="t-nombre"
                placeholder="Nombre (Ej: Apertura)"
                class="w-full p-3 rounded-xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-green-600 font-bold text-xs"
                required
              />
              <div class="grid grid-cols-2 gap-2">
                <select
                  id="t-tipo"
                  class="p-3 rounded-xl bg-gray-50 font-bold text-[9px] border-none outline-none"
                >
                  <option value="LIGA">LIGA</option>
                  <option value="ELIMINATORIA">PLAYOFFS</option>
                  <option value="HIBRIDO">HÍBRIDO</option>
                </select>
                <select
                  id="t-temporada"
                  class="p-3 rounded-xl bg-gray-50 font-bold text-[9px] border-none outline-none"
                >
                  <option value="2026">2026</option>
                  <option value="2027">2027</option>
                </select>
              </div>
              <button
                type="submit"
                class="w-full bg-[#004d26] text-white font-black py-3 rounded-xl uppercase text-[10px] tracking-widest shadow-md"
              >
                Crear Torneo
              </button>
            </form>
          </div>

          <div
            id="seccion-add-equipo"
            class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100"
          >
            <h3
              class="font-black uppercase italic mb-4 text-[#004d26] text-[10px] border-b pb-2"
            >
              ➕ Añadir a Tabla
            </h3>
            <form id="form-nuevo-equipo" class="space-y-3">
              <div class="flex gap-2">
                <select
                  id="p-torneo"
                  onchange="actualizarTodo()"
                  class="flex-1 p-3 rounded-xl bg-gray-50 font-bold text-[10px] outline-none border-none"
                ></select>
                <button
                  type="button"
                  onclick="eliminarTorneoActual()"
                  class="bg-red-50 text-red-500 p-3 rounded-xl hover:bg-red-500 shadow-sm"
                >
                  <i class="fa-solid fa-trash-can"></i>
                </button>
              </div>
              <select
                id="p-equipo"
                class="w-full p-3 rounded-xl bg-gray-50 font-bold text-xs border-none outline-none"
              ></select>
              <input
                type="text"
                id="p-grupo"
                placeholder="Serie (A, B...)"
                class="w-full p-3 rounded-xl bg-gray-50 font-bold text-xs uppercase border-none outline-none"
              />
              <button
                type="submit"
                class="w-full bg-[#004d26] text-white font-black py-3 rounded-xl uppercase text-[10px] tracking-widest"
              >
                Añadir Fila
              </button>
            </form>
          </div>
        </aside>

        <section class="xl:col-span-9 space-y-10">
          <div
            id="modulo-liga"
            class="bg-white p-8 rounded-[3rem] shadow-xl border border-gray-100"
          >
            <h3 class="font-black uppercase italic text-[#004d26] text-xl mb-6">
              Editor de Puntos
            </h3>
            <div id="contenedor-tablas-admin" class="space-y-10"></div>
          </div>

          <div
            id="modulo-eliminatorias"
            class="bg-white p-8 rounded-[3rem] shadow-xl border border-gray-100"
          >
            <div class="flex justify-between items-center mb-6">
              <h3 class="font-black uppercase italic text-[#004d26] text-xl">
                Llaves de Fase Final
              </h3>
              <button
                onclick="abrirModalLlave()"
                class="bg-[#004d26] text-white px-4 py-2 rounded-xl font-black uppercase text-[9px]"
              >
                + Nueva Llave
              </button>
            </div>
            <div id="contenedor-eliminatorias" class="space-y-6"></div>
          </div>
        </section>
      </div>
    </main>

    <div
      id="modal-llave"
      class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-bg"
    >
      <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
        <h3 class="font-black uppercase italic text-[#004d26] mb-6 text-center">
          Configurar Cruce
        </h3>
        <form id="form-nueva-llave" class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <select
              id="l-fase"
              class="p-3 rounded-xl bg-gray-50 font-bold text-xs outline-none"
            >
              <option value="OCTAVOS">OCTAVOS</option>
              <option value="CUARTOS">CUARTOS</option>
              <option value="SEMIFINAL">SEMIFINAL</option>
              <option value="FINAL">GRAN FINAL</option>
            </select>
            <select
              id="l-modo"
              class="p-3 rounded-xl bg-gray-50 font-bold text-xs outline-none"
            >
              <option value="IDA_VUELTA">IDA Y VUELTA</option>
              <option value="SOLO_IDA">SOLO IDA</option>
            </select>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <select
              id="l-equipo1"
              class="w-full p-3 rounded-xl bg-gray-50 font-bold text-xs border-none outline-none"
            ></select>
            <select
              id="l-equipo2"
              class="w-full p-3 rounded-xl bg-gray-50 font-bold text-xs border-none outline-none"
            ></select>
          </div>
          <input
            type="number"
            id="l-orden"
            placeholder="Posición (1, 2, 3...)"
            class="w-full p-3 rounded-xl bg-gray-50 font-bold text-xs border-none outline-none"
          />
          <div class="flex gap-2 pt-4">
            <button
              type="button"
              onclick="cerrarModalLlave()"
              class="flex-1 bg-gray-100 text-gray-400 font-black py-3 rounded-xl uppercase text-[10px]"
            >
              Cerrar
            </button>
            <button
              type="submit"
              class="flex-1 bg-[#004d26] text-white font-black py-3 rounded-xl uppercase text-[10px]"
            >
              Guardar
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script>
      let listaEquiposBase = [];
      let torneosData = [];

      window.onload = () => {
        cargarTorneos();
        cargarEquiposExistentes();
      };

      async function cargarEquiposExistentes() {
        const { data } = await _supabase
          .from("equipos")
          .select("nombre, escudo_url")
          .order("nombre");
        if (data) {
          listaEquiposBase = data;
          const opts =
            '<option value="">-- Club --</option>' +
            data
              .map((e) => `<option value="${e.nombre}">${e.nombre}</option>`)
              .join("");
          document.getElementById("p-equipo").innerHTML = opts;
          document.getElementById("l-equipo1").innerHTML = opts;
          document.getElementById("l-equipo2").innerHTML = opts;
        }
      }

      async function cargarTorneos() {
        const { data } = await _supabase
          .from("competiciones")
          .select("*")
          .order("id", { ascending: false });
        if (data) {
          torneosData = data;
          document.getElementById("p-torneo").innerHTML = data
            .map(
              (t) =>
                `<option value="${t.id}">${t.nombre} (${t.temporada})</option>`,
            )
            .join("");
          actualizarTodo();
        }
      }

      async function actualizarTodo() {
        const tId = document.getElementById("p-torneo").value;
        const torneo = torneosData.find((t) => t.id == tId);
        if (!torneo) return;

        document
          .getElementById("modulo-liga")
          .classList.toggle("hidden", torneo.tipo === "ELIMINATORIA");
        document
          .getElementById("modulo-eliminatorias")
          .classList.toggle("hidden", torneo.tipo === "LIGA");

        if (torneo.tipo !== "ELIMINATORIA") actualizarVistaAdmin();
        if (torneo.tipo !== "LIGA") actualizarVistaEliminatorias();
      }

      // --- TABLAS LIGA ---
      async function actualizarVistaAdmin() {
        const tId = document.getElementById("p-torneo").value;
        const { data } = await _supabase
          .from("posiciones")
          .select("*")
          .eq("competicion_id", tId)
          .order("puntos", { ascending: false });
        const cont = document.getElementById("contenedor-tablas-admin");
        if (!data || data.length === 0) {
          cont.innerHTML =
            '<p class="text-center py-10 text-gray-300 italic">Vacio.</p>';
          return;
        }

        const grupos = data.reduce((acc, i) => {
          const g = i.grupo || "A";
          if (!acc[g]) acc[g] = [];
          acc[g].push(i);
          return acc;
        }, {});

        cont.innerHTML = Object.keys(grupos)
          .map(
            (g) => `
          <div class="border rounded-[2rem] overflow-hidden mb-6">
            <div class="bg-gray-50 px-6 py-3 font-black text-[#004d26] text-[10px]">SERIE ${g}</div>
            <table class="w-full text-[10px] text-center">
              <tr class="text-gray-400 font-black uppercase border-b"><th class="px-4 py-3 text-left">Club</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>GF</th><th>GC</th><th>DG</th><th>PTS</th><th>ACC</th></tr>
              ${grupos[g]
                .map(
                  (e) => `
                <tr id="row-${e.id}" class="border-b">
                  <td class="px-4 py-3 text-left font-black italic flex items-center gap-2"><img src="${e.logo_url}" class="w-5 h-5">${e.equipo_nombre}</td>
                  <td><input type="number" class="input-tabla" value="${e.pj}" id="pj-${e.id}"></td>
                  <td><input type="number" class="input-tabla text-green-600" value="${e.pg}" id="pg-${e.id}"></td>
                  <td><input type="number" class="input-tabla text-blue-600" value="${e.pe}" id="pe-${e.id}"></td>
                  <td><input type="number" class="input-tabla text-red-500" value="${e.pp}" id="pp-${e.id}"></td>
                  <td><input type="number" class="input-tabla" value="${e.gf}" id="gf-${e.id}"></td>
                  <td><input type="number" class="input-tabla" value="${e.gc}" id="gc-${e.id}"></td>
                  <td class="font-bold text-gray-400">${e.gf - e.gc}</td>
                  <td><input type="number" class="input-tabla font-black text-[#004d26]" value="${e.puntos}" id="pts-${e.id}"></td>
                  <td class="px-4 py-2 flex gap-1 justify-end">
                    <button onclick="guardarFila(${e.id})" class="bg-green-600 text-white w-7 h-7 rounded-lg"><i class="fa-solid fa-floppy-disk"></i></button>
                    <button onclick="eliminarFila(${e.id})" class="bg-red-50 text-red-500 w-7 h-7 rounded-lg"><i class="fa-solid fa-trash-can"></i></button>
                  </td>
                </tr>`,
                )
                .join("")}
            </table>
          </div>`,
          )
          .join("");
      }

      async function guardarFila(id) {
        const p = {
          pj: parseInt(document.getElementById(`pj-${id}`).value),
          pg: parseInt(document.getElementById(`pg-${id}`).value),
          pe: parseInt(document.getElementById(`pe-${id}`).value),
          pp: parseInt(document.getElementById(`pp-${id}`).value),
          gf: parseInt(document.getElementById(`gf-${id}`).value),
          gc: parseInt(document.getElementById(`gc-${id}`).value),
          puntos: parseInt(document.getElementById(`pts-${id}`).value),
        };
        await _supabase.from("posiciones").update(p).eq("id", id);
        actualizarVistaAdmin();
      }

      async function eliminarFila(id) {
        if (confirm("¿Eliminar?")) {
          await _supabase.from("posiciones").delete().eq("id", id);
          actualizarTodo();
        }
      }

      // --- MOTOR ELIMINATORIAS PRO ---
      async function actualizarVistaEliminatorias() {
        const tId = document.getElementById("p-torneo").value;
        const { data } = await _supabase
          .from("eliminatorias")
          .select("*")
          .eq("competicion_id", tId)
          .order("orden", { ascending: true });
        const cont = document.getElementById("contenedor-eliminatorias");
        if (!data || data.length === 0) {
          cont.innerHTML =
            '<p class="text-center py-10 text-[10px] italic text-gray-300">Crea una llave para empezar.</p>';
          return;
        }

        cont.innerHTML = data
          .map(
            (l) => `
          <div class="bg-gray-50 p-5 rounded-[2rem] border border-gray-100 shadow-sm relative">
            <div class="flex justify-between items-center mb-4">
              <span class="bg-[#004d26] text-white px-3 py-1 rounded-full font-black text-[7px] italic">${l.fase} (${l.modo === "SOLO_IDA" ? "IDA" : "IDA/VTA"})</span>
              <button onclick="eliminarLlave(${l.id})" class="text-red-300 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>
            </div>
            <div class="grid grid-cols-12 gap-3 items-center">
              <div class="col-span-4 flex items-center gap-2"><img src="${l.logo_1}" class="w-7 h-7"><span class="font-black text-[9px] uppercase italic">${l.equipo_1}</span></div>
              <div class="col-span-4 flex flex-col gap-2 items-center">
                <div class="flex gap-2 items-center bg-white p-1 rounded-lg border">
                  <input type="number" value="${l.goles_1_ida}" onchange="updateLlave(${l.id}, 'goles_1_ida', this.value)" class="w-7 text-center font-black text-xs">
                  <span class="text-[7px] font-black text-gray-300">IDA</span>
                  <input type="number" value="${l.goles_2_ida}" onchange="updateLlave(${l.id}, 'goles_2_ida', this.value)" class="w-7 text-center font-black text-xs">
                </div>
                ${
                  l.modo === "IDA_VUELTA"
                    ? `
                <div class="flex gap-2 items-center bg-white p-1 rounded-lg border">
                  <input type="number" value="${l.goles_1_vuelta}" onchange="updateLlave(${l.id}, 'goles_1_vuelta', this.value)" class="w-7 text-center font-black text-xs">
                  <span class="text-[7px] font-black text-gray-300">VTA</span>
                  <input type="number" value="${l.goles_2_vuelta}" onchange="updateLlave(${l.id}, 'goles_2_vuelta', this.value)" class="w-7 text-center font-black text-xs">
                </div>`
                    : ""
                }
              </div>
              <div class="col-span-4 flex items-center justify-end gap-2 text-right"><span class="font-black text-[9px] uppercase italic">${l.equipo_2}</span><img src="${l.logo_2}" class="w-7 h-7"></div>
            </div>
            <div class="mt-4 pt-3 border-t border-gray-200 flex justify-center gap-4">
                <div class="flex items-center gap-2">
                    <label class="text-[7px] font-black text-gray-400">PEN 1</label>
                    <input type="number" value="${l.penales_1 || 0}" onchange="updateLlave(${l.id}, 'penales_1', this.value)" class="w-8 border-b text-center font-bold text-[10px]">
                </div>
                <div class="flex items-center gap-2">
                    <label class="text-[7px] font-black text-gray-400">PEN 2</label>
                    <input type="number" value="${l.penales_2 || 0}" onchange="updateLlave(${l.id}, 'penales_2', this.value)" class="w-8 border-b text-center font-bold text-[10px]">
                </div>
            </div>
          </div>`,
          )
          .join("");
      }

      async function updateLlave(id, campo, valor) {
        const u = {};
        u[campo] = parseInt(valor);
        await _supabase.from("eliminatorias").update(u).eq("id", id);
      }

      async function eliminarLlave(id) {
        if (confirm("¿Eliminar?")) {
          await _supabase.from("eliminatorias").delete().eq("id", id);
          actualizarVistaEliminatorias();
        }
      }

      function abrirModalLlave() {
        document.getElementById("modal-llave").classList.remove("hidden");
      }
      function cerrarModalLlave() {
        document.getElementById("modal-llave").classList.add("hidden");
      }

      document.getElementById("form-nueva-llave").onsubmit = async (e) => {
        e.preventDefault();
        const eq1 = document.getElementById("l-equipo1").value;
        const eq2 = document.getElementById("l-equipo2").value;
        const info1 = listaEquiposBase.find((x) => x.nombre === eq1);
        const info2 = listaEquiposBase.find((x) => x.nombre === eq2);
        const p = {
          competicion_id: document.getElementById("p-torneo").value,
          fase: document.getElementById("l-fase").value,
          modo: document.getElementById("l-modo").value, // Guardamos si es Ida o Vta
          equipo_1: eq1,
          equipo_2: eq2,
          logo_1: info1 ? info1.escudo_url : "",
          logo_2: info2 ? info2.escudo_url : "",
          orden: parseInt(document.getElementById("l-orden").value) || 0,
        };
        const { error } = await _supabase.from("eliminatorias").insert([p]);
        if (!error) {
          cerrarModalLlave();
          actualizarVistaEliminatorias();
        }
      };

      document.getElementById("form-nuevo-equipo").onsubmit = async (e) => {
        e.preventDefault();
        const n = document.getElementById("p-equipo").value;
        const info = listaEquiposBase.find((eq) => eq.nombre === n);
        const p = {
          competicion_id: document.getElementById("p-torneo").value,
          equipo_nombre: n,
          logo_url: info ? info.escudo_url : "",
          grupo: document.getElementById("p-grupo").value.toUpperCase() || "A",
        };
        await _supabase.from("posiciones").insert([p]);
        actualizarTodo();
      };

      document.getElementById("form-torneo").onsubmit = async (e) => {
        e.preventDefault();
        const n = document.getElementById("t-nombre").value;
        const t = document.getElementById("t-tipo").value;
        const anio = document.getElementById("t-temporada").value;
        const { error } = await _supabase
          .from("competiciones")
          .insert([{ nombre: n, tipo: t, temporada: parseInt(anio) }]);
        if (!error) {
          location.reload();
        }
      };

      async function eliminarTorneoActual() {
        const tId = document.getElementById("p-torneo").value;
        if (confirm(`¿Borrar torneo?`)) {
          await _supabase.from("competiciones").delete().eq("id", tId);
          location.reload();
        }
      }
    </script>
  </body>
</html>

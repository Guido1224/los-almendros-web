<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Calendario | Mando Presidencial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <style>
      body {
        max-width: 100%;
        overflow-x: hidden;
      }
      /* Quitamos el filtro invertido para que los iconos se vean negros en fondo blanco */
      input[type="date"]::-webkit-calendar-picker-indicator,
      input[type="time"]::-webkit-calendar-picker-indicator {
        filter: none;
      }
      .hidden {
        display: none;
      }
      .animate-fade-in {
        animation: fadeIn 0.3s ease-in-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="bg-gray-100 text-gray-900 min-h-screen">
    <nav
      class="bg-[#004d26] p-4 flex justify-between items-center sticky top-0 z-50 shadow-xl"
    >
      <a
        href="admin.html"
        class="text-[10px] font-black uppercase tracking-widest text-white/70 hover:text-white transition"
      >
        <i class="fa-solid fa-arrow-left mr-2"></i> Volver al Panel
      </a>
      <div
        class="font-black italic text-sm tracking-tighter uppercase text-white"
      >
        CD LOS ALMENDROS
      </div>
    </nav>

    <main class="container mx-auto max-w-4xl p-6 lg:py-12">
      <header class="mb-10">
        <span
          class="text-[#004d26] font-black text-[10px] uppercase tracking-[0.4em] italic"
          >Gestión de Temporada</span
        >
        <h2
          class="text-4xl font-black uppercase italic tracking-tighter text-gray-800"
        >
          Programar Encuentro
        </h2>
        <p class="text-gray-500 text-xs font-bold uppercase mt-2">
          Los partidos aparecerán en el calendario público hasta que se les
          asigne un resultado.
        </p>
      </header>

      <form id="formCalendario" class="space-y-8">
        <div
          class="bg-white p-8 rounded-[2.5rem] border border-gray-200 shadow-xl"
        >
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-6">
              <div>
                <label
                  class="block text-[10px] font-black text-gray-500 uppercase mb-3 ml-2"
                  >Nombre del Rival</label
                >
                <input
                  type="text"
                  id="rival"
                  required
                  placeholder="Ej. Riberalta FC"
                  class="w-full bg-gray-50 border border-gray-200 p-4 rounded-2xl outline-none focus:border-[#004d26] text-sm font-bold uppercase text-gray-800"
                />
              </div>
              <div>
                <label
                  class="block text-[10px] font-black text-gray-500 uppercase mb-3 ml-2"
                  >Estado del Partido</label
                >
                <select
                  id="estado"
                  class="w-full bg-gray-50 border border-gray-200 p-4 rounded-2xl outline-none focus:border-[#004d26] text-sm font-bold text-gray-800"
                >
                  <option value="Programado" selected>✅ Programado</option>
                  <option value="Por confirmar">⏳ Por confirmar</option>
                  <option value="Suspendido">🚫 Suspendido</option>
                </select>
              </div>
            </div>

            <div class="space-y-6">
              <div>
                <label
                  class="text-[10px] font-black uppercase text-gray-400 mb-2 block tracking-widest"
                  >Escudo del Rival</label
                >
                <div class="relative">
                  <input
                    type="file"
                    id="rival-escudo-file"
                    accept="image/*"
                    class="hidden"
                    onchange="updateFileName(this)"
                  />
                  <label
                    for="rival-escudo-file"
                    class="w-full bg-gray-50 border-2 border-dashed border-gray-200 p-8 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:border-[#004d26] transition group"
                  >
                    <i
                      class="fa-solid fa-cloud-arrow-up text-2xl text-gray-400 group-hover:text-[#004d26] mb-2"
                    ></i>
                    <span
                      id="file-name"
                      class="text-[10px] font-black uppercase text-gray-400"
                      >Seleccionar Imagen</span
                    >
                  </label>
                </div>
              </div>
              <div>
                <label
                  class="block text-[10px] font-black text-gray-400 uppercase mb-3 ml-2 italic"
                  >Atajo de Liga</label
                >
                <button
                  type="button"
                  onclick="abrirModalEquipos()"
                  class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl text-white font-black uppercase text-[10px] tracking-widest transition active:scale-95 shadow-lg shadow-blue-900/10"
                >
                  <i class="fa-solid fa-shield-halved mr-2"></i> Seleccionar
                  Equipo BD
                </button>
              </div>
            </div>
          </div>
        </div>

        <div
          class="bg-white p-8 rounded-[2.5rem] border border-gray-200 shadow-xl"
        >
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
              <label
                class="block text-[10px] font-black text-gray-500 uppercase mb-3 ml-2"
                >Fecha del Encuentro</label
              >
              <input
                type="date"
                id="fecha"
                required
                class="w-full bg-gray-50 border border-gray-200 p-4 rounded-2xl outline-none text-sm font-bold text-gray-800"
              />
            </div>
            <div>
              <label
                class="block text-[10px] font-black text-gray-500 uppercase mb-3 ml-2"
                >Hora de Inicio</label
              >
              <input
                type="time"
                id="hora"
                required
                class="w-full bg-gray-50 border border-gray-200 p-4 rounded-2xl outline-none text-sm font-bold text-gray-800"
              />
            </div>
            <div>
              <label
                class="block text-[10px] font-black text-gray-500 uppercase mb-3 ml-2"
                >Jornada / Fase</label
              >
              <input
                type="text"
                id="jornada"
                placeholder="Ej. Jornada 12"
                class="w-full bg-gray-50 border border-gray-200 p-4 rounded-2xl outline-none text-sm font-bold uppercase text-gray-800"
              />
            </div>
          </div>
        </div>

        <div
          class="bg-white p-8 rounded-[2.5rem] border border-gray-200 shadow-xl"
        >
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label
                class="block text-[10px] font-black text-gray-500 uppercase mb-3 ml-2"
                >Competición</label
              >
              <select
                id="competicion"
                onchange="verificarNuevaCompeticion(this.value)"
                class="w-full bg-gray-50 border border-gray-200 p-4 rounded-2xl outline-none focus:border-[#004d26] text-sm font-bold text-gray-800"
              >
                <option value="Liga">La Liga</option>
                <option value="Copa Riberalta">Copa Riberalta</option>
                <option value="Copa Pre Simon Bolivar">
                  Copa Pre Simón Bolívar
                </option>
                <option value="Copa Simon Bolivar">Copa Simón Bolívar</option>
                <option value="Amistoso">Partido Amistoso</option>
                <option value="NUEVA" class="text-yellow-600 font-black">
                  -- Agregar Nueva --
                </option>
              </select>
              <div
                id="contenedor-nueva-comp"
                class="mt-4 hidden animate-fade-in"
              >
                <input
                  type="text"
                  id="nueva-competicion"
                  placeholder="Nombre de la nueva competición"
                  class="w-full bg-yellow-50 border border-yellow-200 p-4 rounded-2xl outline-none focus:border-yellow-500 text-sm font-bold uppercase text-yellow-700"
                />
              </div>
            </div>
            <div>
              <label
                class="block text-[10px] font-black text-gray-500 uppercase mb-3 ml-2"
                >Estadio / Ubicación</label
              >
              <input
                type="text"
                id="ubicacion"
                placeholder="Estadio Municipal de Riberalta"
                class="w-full bg-gray-50 border border-gray-200 p-4 rounded-2xl outline-none focus:border-[#004d26] text-sm font-bold uppercase text-gray-800"
              />
            </div>
          </div>
        </div>

        <button
          type="submit"
          id="btnGuardar"
          class="w-full bg-[#004d26] hover:bg-[#003d1e] py-6 rounded-[2rem] text-white font-black uppercase text-xs tracking-[0.3em] transition-all shadow-xl active:scale-95"
        >
          Publicar en Calendario
        </button>
      </form>
    </main>

    <div
      id="modal-equipos"
      class="fixed inset-0 z-[200] hidden bg-black/60 backdrop-blur-sm flex items-center justify-center p-4"
    >
      <div
        class="bg-white w-full max-w-2xl rounded-[2.5rem] border border-gray-200 shadow-2xl overflow-hidden flex flex-col max-h-[90vh]"
      >
        <div
          class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50"
        >
          <h3
            class="font-black uppercase italic text-sm tracking-tighter text-blue-600"
          >
            Base de Datos de Equipos
          </h3>
          <button
            onclick="cerrarModalEquipos()"
            class="text-gray-400 hover:text-red-500 transition"
          >
            <i class="fa-solid fa-xmark text-xl"></i>
          </button>
        </div>
        <div
          id="lista-equipos-db"
          class="p-6 grid grid-cols-2 md:grid-cols-3 gap-4 overflow-y-auto"
        ></div>
        <div class="p-6 bg-gray-50 border-t border-gray-100">
          <p
            class="text-[9px] font-black uppercase text-yellow-600 mb-4 italic"
          >
            Agregar o Actualizar Club
          </p>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input
              type="text"
              id="nuevo-equipo-nombre"
              placeholder="NOMBRE DEL CLUB"
              class="bg-white border border-gray-200 p-3 rounded-xl text-xs uppercase font-bold text-gray-800 outline-none"
            />
            <input
              type="file"
              id="nuevo-equipo-file"
              class="text-[10px] text-gray-500"
            />
          </div>
          <button
            onclick="guardarEquipoEnBase()"
            id="btn-guardar-db"
            class="w-full mt-4 bg-green-600 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-green-700 transition"
          >
            Registrar en Base de Datos
          </button>
        </div>
      </div>
    </div>

    <script>
      let urlEscudoSeleccionado = null;

      function updateFileName(input) {
        const fileName = input.files[0]
          ? input.files[0].name
          : "Seleccionar Imagen";
        document.getElementById("file-name").innerText = fileName;
        document.getElementById("file-name").classList.remove("text-blue-400");
      }

      document
        .getElementById("formCalendario")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = document.getElementById("btnGuardar");
          btn.disabled = true;
          btn.innerText = "🛠️ PROCESANDO...";

          const competicionSelect =
            document.getElementById("competicion").value;
          const competicionInput = document
            .getElementById("nueva-competicion")
            .value.trim();
          let competicionFinal =
            competicionSelect === "NUEVA"
              ? competicionInput
              : competicionSelect;

          if (competicionSelect === "NUEVA" && !competicionInput) {
            alert("⚠️ Escriba el nombre de la nueva competición.");
            btn.disabled = false;
            btn.innerText = "Publicar";
            return;
          }

          const horaInput = document.getElementById("hora").value;
          if (!horaInput) {
            alert("⚠️ Define la hora.");
            btn.disabled = false;
            return;
          }

          const fileManual =
            document.getElementById("rival-escudo-file").files[0];
          let publicUrl = urlEscudoSeleccionado;

          if (fileManual) {
            const fileName = `escudo_${Date.now()}.${fileManual.name.split(".").pop()}`;
            await _supabase.storage
              .from("escudos")
              .upload(fileName, fileManual);
            publicUrl = _supabase.storage.from("escudos").getPublicUrl(fileName)
              .data.publicUrl;
          }

          const datos = {
            rival: document.getElementById("rival").value.toUpperCase(),
            rival_escudo: publicUrl,
            estado: document.getElementById("estado").value,
            fecha: document.getElementById("fecha").value,
            hora: horaInput,
            jornada: document.getElementById("jornada").value.toUpperCase(),
            competicion: competicionFinal.toUpperCase(),
            ubicacion: document.getElementById("ubicacion").value.toUpperCase(),
            creado_en: new Date(),
          };

          const { error } = await _supabase.from("calendario").insert([datos]);
          if (error) {
            alert("❌ Error: " + error.message);
            btn.disabled = false;
          } else {
            alert("✅ PUBLICADO CON ÉXITO");
            location.reload();
          }
        });

      async function abrirModalEquipos() {
        document.getElementById("modal-equipos").classList.remove("hidden");
        const { data } = await _supabase
          .from("equipos")
          .select("*")
          .order("nombre", { ascending: true });
        const contenedor = document.getElementById("lista-equipos-db");
        contenedor.innerHTML =
          data
            ?.map(
              (e) => `
            <div onclick="seleccionarEquipo('${e.nombre}', '${e.escudo_url}')" class="bg-gray-50 p-4 rounded-2xl border border-gray-100 hover:border-blue-500 cursor-pointer transition text-center group">
                <img src="${e.escudo_url}" class="w-12 h-12 object-contain mx-auto mb-2 group-hover:scale-110 transition">
                <p class="text-[9px] font-black uppercase truncate text-gray-700">${e.nombre}</p>
            </div>`,
            )
            .join("") || "";
      }

      function cerrarModalEquipos() {
        document.getElementById("modal-equipos").classList.add("hidden");
      }

      function seleccionarEquipo(nombre, url) {
        document.getElementById("rival").value = nombre;
        urlEscudoSeleccionado = url;
        document.getElementById("file-name").innerText =
          "✨ ESCUDO SELECCIONADO";
        document.getElementById("file-name").classList.add("text-blue-600");
        cerrarModalEquipos();
      }

      async function guardarEquipoEnBase() {
        const nombre = document
          .getElementById("nuevo-equipo-nombre")
          .value.toUpperCase();
        const file = document.getElementById("nuevo-equipo-file").files[0];
        if (!nombre || !file) return alert("Completa los datos");
        const fileName = `base_${nombre}_${Date.now()}.${file.name.split(".").pop()}`;
        await _supabase.storage.from("escudos").upload(fileName, file);
        const { data: urlData } = _supabase.storage
          .from("escudos")
          .getPublicUrl(fileName);
        await _supabase
          .from("equipos")
          .upsert(
            { nombre, escudo_url: urlData.publicUrl },
            { onConflict: "nombre" },
          );
        alert("✅ EQUIPO GUARDADO");
        abrirModalEquipos();
      }

      function verificarNuevaCompeticion(valor) {
        const contenedor = document.getElementById("contenedor-nueva-comp");
        if (valor === "NUEVA") {
          contenedor.classList.remove("hidden");
          document.getElementById("nueva-competicion").focus();
        } else {
          contenedor.classList.add("hidden");
        }
      }
    </script>
  </body>
</html>

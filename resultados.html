<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Resultados Oficiales | CD Los Almendros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      /* RESET Y RESPONSIVE FIX */
      @import url("https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;700;900&display=swap");
      body {
        font-family: "Public Sans", sans-serif;
      }
      html,
      body {
        max-width: 100vw;
        overflow-x: hidden;
        background-color: #f3f4f6;
        margin: 0;
        padding: 0;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
      }

      .match-card:hover {
        transform: translateY(-2px);
        transition: all 0.3s ease;
      }

      /* SUB-NAV CON DEGRADADO VERDE -> BLANCO */
      .sub-nav-gradient {
        background: linear-gradient(
          to right,
          #004d26 0%,
          #004d26 40%,
          #ffffff 100%
        );
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans">
    <header
      class="bg-[#004d26] py-3 px-4 md:px-8 text-white flex flex-col md:flex-row justify-between items-center shadow-md sticky top-0 z-[60] gap-4 md:gap-0"
    >
      <div
        class="flex items-center w-full md:w-auto justify-between md:justify-start gap-6"
      >
        <a
          href="index.html"
          class="flex items-center gap-3 hover:text-yellow-500 transition-colors shrink-0"
        >
          <i class="fa-solid fa-arrow-left text-xs"></i>
          <span
            class="font-black italic text-[10px] md:text-xs tracking-tighter uppercase"
            >Inicio</span
          >
        </a>
        <span
          class="md:hidden font-black italic text-[10px] tracking-tighter uppercase"
          >CD Los Almendros</span
        >
      </div>

      <nav
        class="flex items-center gap-6 md:gap-10 overflow-x-auto no-scrollbar whitespace-nowrap"
      >
        <a
          href="jugadores.html"
          class="font-black italic text-[10px] md:text-xs tracking-widest uppercase text-white/60 hover:text-white transition-all pb-1"
          >Jugadores</a
        >
        <a
          href="calendario.html"
          class="font-black italic text-[10px] md:text-xs tracking-widest uppercase text-white/60 hover:text-white transition-all pb-1"
          >Calendario</a
        >
        <a
          href="resultados.html"
          class="font-black italic text-[10px] md:text-xs tracking-widest uppercase text-yellow-500 border-b-2 border-yellow-500 pb-1"
          >Resultados</a
        >
        <a
          href="clasificacion.html"
          class="font-black italic text-[10px] md:text-xs tracking-widest uppercase text-white/60 hover:text-white transition-all pb-1"
          >Clasificación</a
        >
      </nav>

      <span
        class="hidden md:block font-black italic text-[10px] md:text-xs tracking-tighter uppercase shrink-0"
        >CD Los Almendros</span
      >
    </header>

    <section class="bg-white container mx-auto px-6 pt-16 pb-4">
      <h1
        class="text-6xl md:text-8xl font-black italic uppercase tracking-tighter text-[#004d26] leading-[0.85]"
      >
        Resultados
      </h1>
      <p
        class="text-gray-400 font-bold uppercase text-[9px] md:text-[11px] tracking-[0.3em] mt-4 ml-1 italic"
      >
        Marcador Oficial | Temporada 2026
      </p>
      <div class="h-1.5 w-full bg-[#004d26] mt-8 rounded-full"></div>
    </section>

    <!-- === 3. SECCIÓN DE FILTROS (DISEÑO LIMPIO) === -->
    <section class="bg-white border-b border-gray-200 py-4 shadow-sm">
      <div
        class="container mx-auto px-6 flex flex-col md:flex-row items-center gap-4"
      >
        <div
          class="flex items-center space-x-2 text-[9px] font-black uppercase tracking-widest text-gray-400"
        >
          <i class="fa-solid fa-filter"></i> <span>Filtrar:</span>
        </div>

        <select
          id="filtro-competicion"
          onchange="aplicarFiltros()"
          class="bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5 text-[10px] font-bold outline-none focus:border-[#004d26] transition w-full md:w-auto"
        >
          <option value="TODAS">Todas las competiciones</option>
          <option value="Liga">La Liga</option>
          <option value="Copa Riberalta">Copa Riberalta</option>
          <option value="Copa Simon Bolivar">Copa Simón Bolívar</option>
          <option value="Amistoso">Amistosos</option>
          <option value="OTROS">Otros</option>
        </select>

        <select
          id="filtro-anio"
          onchange="aplicarFiltros()"
          class="bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5 text-[10px] font-bold outline-none focus:border-[#004d26] transition w-full md:w-auto"
        >
          <option value="TODOS">Todas las Gestiones</option>
        </select>

        <button
          onclick="reiniciarFiltros()"
          class="text-[9px] font-black uppercase text-red-600 hover:text-red-800 transition md:ml-auto"
        >
          <i class="fa-solid fa-rotate-left mr-1"></i> Reiniciar
        </button>
      </div>
    </section>

    <!-- === 4. LISTADO DE RESULTADOS === -->
    <main class="container mx-auto px-4 py-10 min-h-screen">
      <div id="lista-resultados" class="max-w-5xl mx-auto">
        <div class="flex justify-center py-20">
          <div
            class="animate-spin rounded-full h-12 w-12 border-b-4 border-[#004d26]"
          ></div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script>
      let todosLosPartidos = [];

      async function cargarResultados() {
        const { data, error } = await _supabase
          .from("partidos")
          .select("*")
          .order("fecha", { ascending: false })
          .order("id", { ascending: false });

        if (error) {
          document.getElementById("lista-resultados").innerHTML =
            "<p class='text-center text-red-500 font-bold'>Error de conexión.</p>";
          return;
        }

        todosLosPartidos = data || [];
        poblarFiltroAnios(todosLosPartidos);
        aplicarFiltros();
      }

      function poblarFiltroAnios(partidos) {
        const select = document.getElementById("filtro-anio");
        const anioActual = new Date().getFullYear();
        let anios = partidos.map((p) =>
          new Date(p.fecha + "T00:00:00").getFullYear(),
        );
        anios.push(anioActual);
        const aniosUnicos = [...new Set(anios)].sort((a, b) => b - a);

        select.innerHTML = '<option value="TODOS">Todas las Gestiones</option>';
        aniosUnicos.forEach((anio) => {
          const opt = document.createElement("option");
          opt.value = anio;
          opt.innerText = `GESTIÓN ${anio}`;
          if (anio === anioActual) opt.selected = true;
          select.appendChild(opt);
        });
      }

      function aplicarFiltros() {
        const comp = document.getElementById("filtro-competicion").value;
        const anio = document.getElementById("filtro-anio").value;

        // Lista de competiciones oficiales para la lógica de "OTROS"
        const predefinidas = [
          "LIGA",
          "COPA RIBERALTA",
          "COPA PRE SIMON BOLIVAR",
          "COPA SIMON BOLIVAR",
          "AMISTOSO",
        ];

        let filtrados = todosLosPartidos;

        // 1. LÓGICA DE COMPETICIÓN (Ahora es insensible a mayúsculas/minúsculas)
        if (comp === "OTROS") {
          filtrados = filtrados.filter(
            (p) => !predefinidas.includes(p.competicion.toUpperCase().trim()),
          );
        } else if (comp !== "TODAS") {
          // Comparamos convirtiendo ambos a MAYÚSCULAS y quitando espacios
          // Esto soluciona el error de que no aparezca nada
          filtrados = filtrados.filter((p) =>
            p.competicion
              .toUpperCase()
              .trim()
              .includes(comp.toUpperCase().trim()),
          );
        }

        // 2. LÓGICA DE GESTIÓN (AÑO)
        if (anio !== "TODOS") {
          filtrados = filtrados.filter((p) => {
            const fecha = new Date(p.fecha + "T00:00:00");
            return fecha.getFullYear() == anio;
          });
        }

        renderizarPartidos(filtrados);
      }

      function renderizarPartidos(partidos) {
        const contenedor = document.getElementById("lista-resultados");
        if (partidos.length === 0) {
          contenedor.innerHTML =
            "<p class='font-black uppercase italic text-center py-20 opacity-30'>No hay encuentros registrados</p>";
          return;
        }

        const agrupados = partidos.reduce((acc, p) => {
          const f = new Date(p.fecha + "T00:00:00");
          const m = f
            .toLocaleDateString("es-ES", { month: "long", year: "numeric" })
            .toUpperCase();
          if (!acc[m]) acc[m] = [];
          acc[m].push(p);
          return acc;
        }, {});

        let html = "";
        for (const mes in agrupados) {
          html += `
            <div class="mb-12">
              <div class="flex items-center mb-6">
                <h3 class="text-xl md:text-2xl font-black italic uppercase tracking-tighter text-gray-800">${mes}</h3>
                <div class="flex-1 h-px bg-gray-200 ml-4"></div>
              </div>
              <div class="space-y-4">
                ${agrupados[mes].map((p) => crearTarjetaHTML(p)).join("")}
              </div>
            </div>`;
        }
        contenedor.innerHTML = html;
      }

      function crearTarjetaHTML(p) {
        const f = new Date(p.fecha + "T00:00:00");
        const diaNom = f
          .toLocaleDateString("es-ES", { weekday: "short" })
          .toUpperCase();
        const gano = p.goles_almendros > p.goles_rival;
        const logoAlmendros =
          "https://oiqxotvntoohugsrutwu.supabase.co/storage/v1/object/public/escudos/logo-almendros.png";

        return `
          <div class="match-card bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden transition-all">
            <div class="flex flex-col md:flex-row items-stretch">
                <div class="bg-gray-50 p-6 flex flex-row md:flex-col items-center justify-center md:w-32 border-b md:border-b-0 md:border-r border-gray-100">
                    <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">${diaNom} ${f.getDate()}</span>
                    <span class="mx-2 md:mx-0 md:mt-1 font-black text-lg text-gray-800">${p.hora ? p.hora.substring(0, 5) : "--:--"}</span>
                </div>
                <div class="flex-1 p-6 flex flex-col justify-center">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center space-x-2">
                            <span class="text-[9px] font-black bg-[#004d26]/10 text-[#004d26] px-2 py-0.5 rounded uppercase">${p.competicion}</span>
                            <span class="text-[9px] font-black text-gray-300 uppercase italic">${p.jornada || ""}</span>
                        </div>
                        ${p.incidencias ? `<button onclick="toggleDetalles(${p.id})" class="text-[9px] font-black uppercase text-[#004d26] hover:underline flex items-center"><i id="icon-${p.id}" class="fa-solid fa-circle-info mr-1"></i> Info</button>` : ""}
                    </div>
                    <div class="grid grid-cols-7 items-center gap-2">
                        <div class="col-span-3 flex items-center justify-end gap-3">
                            <span class="font-black uppercase italic text-xs md:text-lg text-gray-800 text-right leading-tight">Los Almendros</span>
                            <img src="${logoAlmendros}" class="w-10 h-10 md:w-14 md:h-14 object-contain shrink-0">
                        </div>
                        <div class="col-span-1 flex flex-col justify-center items-center">
                            <div class="font-black text-2xl md:text-4xl italic flex items-center">
                                <span class="${gano ? "text-[#004d26]" : "text-gray-400"}">${p.goles_almendros}</span>
                                <span class="text-gray-200 mx-1 opacity-30">-</span>
                                <span class="text-red-600">${p.goles_rival}</span>
                            </div>
                            <span class="text-[8px] font-black text-gray-300 italic mt-1">FINAL</span>
                        </div>
                        <div class="col-span-3 flex items-center justify-start gap-3">
                            <img src="${p.rival_escudo || ""}" class="w-10 h-10 md:w-14 md:h-14 object-contain shrink-0">
                            <span class="font-black uppercase italic text-xs md:text-lg text-gray-600 text-left leading-tight">${p.rival}</span>
                        </div>
                    </div>
                </div>
            </div>
            <div id="detalles-${p.id}" class="hidden px-6 pb-6">
                <div class="bg-gray-50 rounded-2xl p-5 border border-gray-100 shadow-inner">
                    <p class="text-[11px] font-bold text-gray-600 italic whitespace-pre-line">${p.incidencias}</p>
                </div>
            </div>
          </div>`;
      }

      function reiniciarFiltros() {
        document.getElementById("filtro-competicion").value = "TODAS";
        document.getElementById("filtro-anio").value = new Date().getFullYear();
        aplicarFiltros();
      }

      function toggleDetalles(id) {
        const c = document.getElementById(`detalles-${id}`);
        const i = document.getElementById(`icon-${id}`);
        if (c.classList.contains("hidden")) {
          c.classList.remove("hidden");
          i.classList.replace("fa-circle-info", "fa-circle-minus");
        } else {
          c.classList.add("hidden");
          i.classList.replace("fa-circle-minus", "fa-circle-info");
        }
      }

      cargarResultados();
    </script>
  </body>
</html>

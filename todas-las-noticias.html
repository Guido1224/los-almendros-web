<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archivo de Noticias | CD Los Almendros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap");
      body {
        font-family: "Public Sans", sans-serif;
      }
    </style>
  </head>
  <body class="bg-white text-gray-900 overflow-x-hidden">
    <!-- === NAV BAR VERDE: BOTÓN IZQUIERDA | MARCA DERECHA === -->
    <nav
      class="bg-[#004d26] text-white sticky top-0 z-[100] shadow-2xl border-b border-yellow-500/20"
    >
      <div
        class="container mx-auto px-6 py-3 flex justify-between items-center"
      >
        <!-- 1. VOLVER AL INICIO (IZQUIERDA - ESTILO EXACTO DE TU FOTO) -->
        <a
          href="index.html"
          class="flex items-center gap-3 hover:text-yellow-500 transition-colors"
        >
          <i class="fa-solid fa-arrow-left"></i>
          <span
            class="font-black italic text-xs md:text-sm tracking-tighter uppercase"
            >Inicio</span
          >
        </a>

        <!-- 2. CD LOS ALMENDROS (DERECHA) -->
        <h1
          class="text-base md:text-xl font-black tracking-tighter uppercase italic"
        >
          CD LOS ALMENDROS
        </h1>
      </div>
    </nav>

    <main class="container mx-auto max-w-6xl px-6 py-8">
      <!-- TÍTULO PRINCIPAL COMPACTO -->
      <div class="border-b-4 border-[#004d26] pb-2 mb-6">
        <h2
          class="text-4xl md:text-7xl font-black uppercase italic tracking-tighter text-[#004d26] leading-none"
        >
          ARCHIVO DE NOTICIAS
        </h2>
        <p
          class="text-gray-400 text-[9px] md:text-[11px] font-bold uppercase tracking-[0.2em] mt-2"
        >
          RIBERALTA, BENI | TEMPORADA 2026
        </p>
      </div>

      <!-- CONTENEDOR DE NOTICIAS (SÚPER COMPACTO) -->
      <div id="contenedor-noticias" class="space-y-1">
        <!-- Cargado por JS -->
      </div>

      <!-- BOTÓN MOSTRAR MÁS -->
      <div class="text-center py-8">
        <button
          id="btn-cargar-mas"
          onclick="cargarMasNoticias()"
          class="hidden bg-[#0b0e14] border-2 border-yellow-500 text-white font-black py-2.5 px-8 rounded-full transition-all uppercase text-[9px] tracking-widest hover:bg-yellow-500 hover:text-black shadow-xl"
        >
          Cargar más noticias
        </button>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/supabase-client.js"></script>
    <script>
      AOS.init({ duration: 800, once: true });

      let paginaActual = 0;
      const NOTICIAS_POR_PAGINA = 20;
      let ultimaFechaRenderizada = "";

      const diasSemana = [
        "domingo",
        "lunes",
        "martes",
        "miércoles",
        "jueves",
        "viernes",
        "sábado",
      ];
      const meses = [
        "enero",
        "febrero",
        "marzo",
        "abril",
        "mayo",
        "junio",
        "julio",
        "agosto",
        "septiembre",
        "octubre",
        "noviembre",
        "diciembre",
      ];

      async function cargarMasNoticias() {
        try {
          const btn = document.getElementById("btn-cargar-mas");
          const loader = document.getElementById("loader-noticias");
          if (btn) btn.classList.add("hidden");
          if (loader) loader.classList.remove("hidden");

          const desde = paginaActual * NOTICIAS_POR_PAGINA;
          const hasta = desde + NOTICIAS_POR_PAGINA - 1;

          const { data: noticias, error } = await _supabase
            .from("noticias")
            .select("*")
            .order("creado_en", { ascending: false })
            .range(desde, hasta);

          if (error) throw error;

          if (noticias && noticias.length > 0) {
            renderizarNoticiasAgrupadas(noticias);
            paginaActual++;
            if (noticias.length === NOTICIAS_POR_PAGINA && btn)
              btn.classList.remove("hidden");
          }
          if (loader) loader.classList.add("hidden");
          setTimeout(() => AOS.refresh(), 100);
        } catch (err) {
          console.error(err);
        }
      }

      function renderizarNoticiasAgrupadas(noticias) {
        const contenedor = document.getElementById("contenedor-noticias");
        let HTMLTemp = "";

        noticias.forEach((n) => {
          const fecha = new Date(n.creado_en || new Date());
          const fechaString = fecha.toLocaleDateString();

          if (fechaString !== ultimaFechaRenderizada) {
            const diaNombre = diasSemana[fecha.getDay()];
            const diaNum = fecha.getDate();
            const mesNombre = meses[fecha.getMonth()];
            const anio = fecha.getFullYear();

            HTMLTemp += `
                        <div class="flex items-end gap-3 border-b-2 border-red-700 pb-1 mt-6 mb-3" data-aos="fade-right">
                            <h3 class="text-xl md:text-2xl font-black uppercase italic leading-none">${diaNombre}</h3>
                            <span class="text-gray-400 text-[9px] font-bold uppercase tracking-widest">${diaNum} ${mesNombre} ${anio}</span>
                        </div>
                    `;
            ultimaFechaRenderizada = fechaString;
          }

          HTMLTemp += `
                    <a href="noticia.html?id=${n.id}" class="group flex flex-row gap-3 py-3 border-b border-gray-100 hover:bg-gray-50 transition-colors items-center" data-aos="fade-up">
                        <div class="w-24 md:w-44 h-16 md:h-28 shrink-0 overflow-hidden rounded-md bg-gray-100">
                            <img src="${n.imagen_principal_url || ""}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                        </div>
                        <div class="flex flex-col justify-center flex-1">
                            <div class="flex items-center gap-2 text-red-700 font-black uppercase text-[7px] md:text-[8px] tracking-widest mb-1">
                                <span class="w-1 h-1 bg-red-700 rounded-full"></span>
                                ${n.etiqueta || "CLUB"}
                            </div>
                            <h4 class="text-[11px] md:text-lg font-black uppercase italic leading-tight text-gray-900 group-hover:text-[#004d26] transition-colors">
                                ${n.titulo}
                            </h4>
                            <span class="text-gray-400 text-[7px] md:text-[8px] font-bold uppercase mt-1">
                                <i class="fa-regular fa-clock mr-1"></i> ${fecha.getHours()}:${fecha.getMinutes().toString().padStart(2, "0")}
                            </span>
                        </div>
                    </a>
                `;
        });
        contenedor.insertAdjacentHTML("beforeend", HTMLTemp);
      }

      window.addEventListener("load", cargarMasNoticias);
    </script>
    <div
      id="cookie-banner"
      class="fixed bottom-0 left-0 w-full z-[9999] transform translate-y-full transition-transform duration-700 ease-in-out"
    >
      <div
        class="bg-gray-900 text-white shadow-2xl border-t-4 border-[#004d26]"
      >
        <div
          class="container mx-auto max-w-6xl p-4 md:p-6 flex flex-col md:flex-row items-center justify-between gap-4"
        >
          <div class="flex-1 text-center md:text-left">
            <div
              class="flex items-center justify-center md:justify-start gap-2 mb-2"
            >
              <i class="fa-solid fa-cookie-bite text-yellow-500 text-xl"></i>
              <h4 class="font-black uppercase italic tracking-tighter text-sm">
                Privacidad y Cookies
              </h4>
            </div>
            <p class="text-xs text-gray-400 font-medium leading-relaxed">
              Utilizamos cookies técnicas y `localStorage` para mantener tu
              sesión segura, guardar tus preferencias y ofrecerte la mejor
              experiencia como socio.
              <a href="perfil.html" class="text-yellow-500 hover:underline"
                >Ver Política completa</a
              >.
            </p>
          </div>

          <div class="flex items-center gap-3 w-full md:w-auto shrink-0">
            <button
              onclick="rechazarCookies()"
              class="flex-1 md:flex-none px-4 py-2 text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-white transition"
            >
              Solo Esenciales
            </button>
            <button
              onclick="aceptarCookies()"
              class="flex-1 md:flex-none px-6 py-3 bg-[#004d26] text-white rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg hover:bg-green-800 transition transform hover:scale-105"
            >
              Aceptar Todas
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Lógica del Banner de Cookies usando LocalStorage
      document.addEventListener("DOMContentLoaded", () => {
        const banner = document.getElementById("cookie-banner");
        const consentimiento = localStorage.getItem("cookiesAccepted");

        // Si no hay registro en localStorage, mostramos el banner deslizándolo hacia arriba
        if (!consentimiento) {
          setTimeout(() => {
            banner.classList.remove("translate-y-full");
          }, 1000); // Aparece 1 segundo después de cargar la página
        }
      });

      function aceptarCookies() {
        localStorage.setItem("cookiesAccepted", "true");
        localStorage.setItem("cookiesNivel", "todas"); // Para futuras integraciones de analíticas
        ocultarBanner();
      }

      function rechazarCookies() {
        localStorage.setItem("cookiesAccepted", "true");
        localStorage.setItem("cookiesNivel", "esenciales"); // Solo guardamos sesión
        ocultarBanner();
      }

      function ocultarBanner() {
        const banner = document.getElementById("cookie-banner");
        banner.classList.add("translate-y-full");
      }
    </script>
  </body>
</html>
